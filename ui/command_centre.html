<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WijerCo Command Centre</title>
  <!-- Installable PWA (served same-origin by the orchestrator at /app) -->
  <link rel="manifest" href="/app/manifest.webmanifest" />
  <meta name="theme-color" content="#1f4d3f" />
  <meta name="application-name" content="Command Centre" />
  <link rel="icon" type="image/png" sizes="192x192" href="/app/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/app/icons/icon-192.png" />
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("/app/sw.js", { scope: "/app/" }).catch(function () {});
      });
    }
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* WijerCo palette */
      --ink:#14231f; --pine:#1f4d3f; --pine-deep:#163b30;
      --gold:#c28f1e; --gold-soft:#e7c873; --gold-tint:#f6eed8;
      --paper:#eef0ea; --surface:#fbfbf8; --surface-2:#f4f5f0;
      --line:#dadfd5; --line-soft:#e6e9e1; --pine-tint:#e4ece6;
      /* compatibility aliases used across existing markup */
      --bg:#eef0ea; --bg2:#fbfbf8; --bg3:#f4f5f0;
      --border:#dadfd5; --border-strong:#cfd6ca;
      --text:#14231f; --muted:#5c665e; --muted-2:#838d84;
      --accent:#1f4d3f; --accent-strong:#163b30; --accent-weak:#e4ece6;
      --green:#1f7a52; --red:#bb4a3f; --yellow:#b07d16;
      --shadow-sm:0 1px 2px rgba(20,35,31,.05);
      --shadow-md:0 8px 28px rgba(20,35,31,.08);
      --shadow-lg:0 18px 44px rgba(20,35,31,.14);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--paper);color:var(--ink);font-family:'Archivo',system-ui,sans-serif;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;line-height:1.5}
    h1,h2,h3,.display,.serif{font-family:'Fraunces',Georgia,serif;font-weight:500;letter-spacing:-.012em}
    ::selection{background:var(--pine-tint);color:var(--pine)}
    ::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#cbd2c7;border-radius:8px;border:2px solid var(--surface)}::-webkit-scrollbar-thumb:hover{background:#b5beb1}
    .typing-cursor::after{content:'▋';animation:blink .7s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    .pill{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.2px}
    .modal-bg{position:fixed;inset:0;background:rgba(20,35,31,.45);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100}
    .session-item{cursor:pointer;padding:10px 12px;border-bottom:1px solid var(--line);border-left:2px solid transparent;transition:background .15s}
    .session-item:hover{background:var(--surface-2)}
    .session-item.active{border-left-color:var(--gold);background:var(--pine-tint)}
    textarea:focus{outline:none;border-color:var(--pine)!important;box-shadow:0 0 0 3px var(--pine-tint)}
    select:focus,input:focus{outline:none;border-color:var(--pine)!important}
    button:focus{outline:none}
    button{transition:background .15s ease,color .15s ease,box-shadow .15s ease,transform .1s ease,border-color .15s ease}
    /* ---- Left rail ---- */
    .rail{width:236px;min-width:236px;background:var(--pine-deep);color:#dfe7e1;display:flex;flex-direction:column;padding:24px 16px 18px;flex-shrink:0}
    .rail-brand{display:flex;flex-direction:column;gap:2px;padding:0 8px 2px}
    .rail-mark{font-family:'Fraunces',serif;font-weight:600;font-size:23px;letter-spacing:-.01em;color:#fff;line-height:1}
    .rail-mark span{color:var(--gold-soft)}
    .rail-tag{font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:#8fa89b;font-weight:600}
    .rail-divider{height:1px;background:rgba(255,255,255,.09);margin:20px 8px}
    .nav-label{font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:#7f988b;font-weight:600;padding:0 10px 9px}
    .rail-nav{display:flex;flex-direction:column;gap:2px;flex:1 1 auto;min-height:0;overflow-y:auto;margin:0 -4px;padding:0 4px}
    .rail-nav::-webkit-scrollbar{width:0}
    .nav-item{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:9px;color:#c4d2c9;font-size:14px;font-weight:500;background:none;border:none;width:100%;text-align:left;cursor:pointer;font-family:inherit;transition:background .16s,color .16s}
    .nav-item svg{width:17px;height:17px;flex:none;stroke:currentColor;fill:none;stroke-width:1.7;opacity:.85}
    .nav-item:hover{background:rgba(255,255,255,.06);color:#eef4f0}
    .nav-item.active{background:var(--pine);color:#fff}
    .nav-item.active svg{opacity:1;color:var(--gold-soft)}
    .rail-foot{flex:none;padding-top:12px;display:flex;flex-direction:column;gap:8px}
    .rail-card{display:flex;align-items:center;gap:10px;padding:10px;border-radius:11px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07)}
    .rail-av{width:32px;height:32px;border-radius:8px;flex:none;background:linear-gradient(135deg,var(--gold) 0%,#9d7016 100%);color:#fff;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif}
    /* ---- Topbar ---- */
    .topbar{display:flex;align-items:center;gap:12px;padding:14px 22px;border-bottom:1px solid var(--line);background:var(--surface);flex-shrink:0}
    .crumb{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted-2,#838d84);font-weight:600}
    .crumb b{color:var(--pine);font-weight:600}
    .icon-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px 6px;border-radius:8px;line-height:1}
    .icon-btn:hover{background:var(--surface-2);color:var(--pine)}
    /* ---- Shared view scaffolding ---- */
    .view-wrap{flex:1;overflow-y:auto;padding:34px 34px 60px;min-width:0}
    .view-inner{max-width:1000px;margin:0 auto}
    .eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:10px}
    .eyebrow::before{content:"";width:22px;height:1.5px;background:var(--gold)}
    .view-title{font-family:'Fraunces',serif;font-weight:500;font-size:clamp(24px,3vw,34px);line-height:1.1;letter-spacing:-.015em;color:var(--ink)}
    .view-lede{font-size:15px;color:var(--muted);margin-top:12px;max-width:62ch;line-height:1.55}
    .row-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:26px 0 14px}
    .row-head h3{font-family:'Fraunces',serif;font-weight:500;font-size:19px;color:var(--ink)}
    .grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow-sm)}
    .card-i{transition:box-shadow .16s,transform .12s,border-color .16s}
    .card-i:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:var(--line-soft)}
    .stat .k{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted-2);font-weight:600}
    .stat .v{font-family:'Fraunces',serif;font-size:32px;font-weight:500;color:var(--pine);margin-top:8px;line-height:1}
    .stat .s{font-size:12.5px;color:var(--muted);margin-top:8px}
    .cap-tag{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);font-weight:600}
    .tagx{font-size:11px;color:var(--muted);background:var(--surface-2);border:1px solid var(--line-soft);padding:4px 9px;border-radius:6px}
    .stag{font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;white-space:nowrap;display:inline-block}
    .st-good{background:var(--pine-tint);color:var(--pine)}
    .st-warn{background:var(--gold-tint);color:#8a630f}
    .st-mute{background:#e9ebe6;color:var(--muted)}
    .st-fail{background:#f6e3e0;color:#a23b2f}
    .bar{height:5px;background:var(--line-soft);border-radius:3px;overflow:hidden}
    .bar i{display:block;height:100%;background:var(--pine);border-radius:3px}
    .doc-ico{width:40px;height:40px;border-radius:9px;flex:none;background:var(--pine-tint);display:flex;align-items:center;justify-content:center;font-size:18px}
    .kv{display:flex;justify-content:space-between;gap:12px;font-size:13px;padding:9px 0;border-bottom:1px solid var(--line-soft)}
    .kv:last-child{border-bottom:none}
    .kan{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .kan-col{background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:12px;min-height:120px}
    .kan-h{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2);font-weight:600;margin-bottom:10px;display:flex;justify-content:space-between}
    .kan-card{background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:11px 12px;box-shadow:var(--shadow-sm);margin-bottom:9px}
    .mini{font-size:11.5px;color:var(--muted-2)}
    .content-grid{display:grid;grid-template-columns:minmax(0,1fr) 292px;gap:14px;margin-top:18px;align-items:start}
    .content-command{display:grid;grid-template-columns:1.12fr repeat(3,minmax(0,.8fr));gap:12px;margin-top:24px}
    .content-action{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:8px;padding:14px 15px;box-shadow:var(--shadow-sm);min-width:0}
    .content-action .k,.content-panel .k,.content-smart .k{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted-2);font-weight:600}
    .content-action .v{font-family:'Fraunces',serif;font-size:22px;line-height:1.18;color:var(--ink);margin-top:8px}
    .content-action .s{font-size:12px;color:var(--muted);line-height:1.45;margin-top:8px}
    .content-health{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:14px;box-shadow:var(--shadow-sm);min-width:0}
    .content-health .v{font-family:'Fraunces',serif;font-size:28px;line-height:1;color:var(--pine);margin-top:9px}
    .content-health .s{font-size:12px;color:var(--muted);line-height:1.35;margin-top:8px}
    .content-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-top:18px}
    .content-tab{border:1px solid var(--line);background:var(--surface);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--muted);font-weight:600;cursor:pointer;font-family:inherit}
    .content-tab.active{background:var(--pine);border-color:var(--pine);color:#fff}
    .content-tools{display:grid;grid-template-columns:minmax(220px,1fr) 170px 170px 150px;gap:10px;margin-top:14px;align-items:center}
    .content-main{min-width:0}
    .content-smart{border:1px solid var(--line);background:var(--surface);border-radius:8px;padding:13px 14px;box-shadow:var(--shadow-sm);margin-bottom:12px}
    .content-smart .v{font-size:13px;color:var(--ink);font-weight:650;line-height:1.35;margin-top:7px}
    .content-smart .s{font-size:12px;color:var(--muted);line-height:1.45;margin-top:6px}
    .content-panel{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:var(--shadow-sm)}
    .content-panel+.content-panel{margin-top:12px}
    .pillar-row{display:grid;grid-template-columns:minmax(0,1fr) 56px;gap:9px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line-soft)}
    .pillar-row:last-child{border-bottom:none}
    .pillar-label{font-size:12.5px;color:var(--ink);font-weight:600;line-height:1.3;min-width:0}
    .pillar-track{height:6px;background:var(--line-soft);border-radius:999px;overflow:hidden;margin-top:6px}
    .pillar-track i{display:block;height:100%;background:var(--pine);border-radius:999px}
    .pillar-count{font-size:12px;color:var(--muted-2);text-align:right}
    .content-card{cursor:pointer;transition:box-shadow .16s,transform .12s,border-color .16s}
    .content-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);border-color:var(--border-strong)}
    .content-card.selected{border-color:var(--pine);box-shadow:0 0 0 2px var(--pine-tint)}
    .content-title{font-size:13px;font-weight:650;color:var(--ink);line-height:1.35}
    .content-card-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:10px}
    .signal-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:10px;padding-top:9px;border-top:1px solid var(--line-soft)}
    .signal-score{font-size:11px;font-weight:700;color:var(--pine);background:var(--pine-tint);border-radius:999px;padding:3px 8px;white-space:nowrap}
    .content-empty{border:1px dashed var(--line);border-radius:8px;padding:12px;color:var(--muted);font-size:12px;background:var(--surface)}
    .delivery-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:24px}
    .delivery-stat{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 15px;box-shadow:var(--shadow-sm);min-width:0}
    .delivery-stat .k{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted-2);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .delivery-stat .v{font-family:'Fraunces',serif;font-size:28px;line-height:1;color:var(--pine);margin-top:8px}
    .delivery-stat .s{font-size:12px;color:var(--muted);margin-top:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .delivery-tools{display:grid;grid-template-columns:minmax(220px,1fr) 180px 180px 160px;gap:10px;margin-top:18px;align-items:center}
    .delivery-input,.delivery-select{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:9px 10px;font-size:12.5px;color:var(--ink);font-family:inherit}
    .delivery-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:18px}
    .delivery-card{display:flex;gap:14px;align-items:flex-start;min-width:0}
    .delivery-card-main{min-width:0;flex:1}
    .delivery-title{font-size:16px;font-weight:500;margin:4px 0 9px;color:var(--ink);line-height:1.3}
    .delivery-meta{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-top:11px}
    .delivery-action{margin-top:14px;padding-top:12px;border-top:1px solid var(--line-soft);display:flex;align-items:center;justify-content:space-between;gap:12px}
    .delivery-action strong{font-size:12.5px;color:var(--ink);font-weight:650;line-height:1.35}
    .delivery-empty{margin-top:18px;background:var(--surface);border:1px dashed var(--line);border-radius:12px;padding:22px;text-align:center;color:var(--muted)}
    .intel-panel{margin-top:18px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow-sm)}
    .intel-list{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
    .intel-card{border:1px solid var(--line-soft);background:var(--surface-2);border-radius:8px;padding:11px 12px;min-width:0}
    .intel-card .h{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
    .intel-card b{font-size:12.5px;color:var(--ink);line-height:1.35}
    .intel-card p{font-size:12px;color:var(--muted);line-height:1.45;margin:0}
    .score-ring{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--pine-tint);color:var(--pine);font-size:12px;font-weight:700;flex:none}
    .delivery-drawer-bg{position:fixed;inset:0;background:rgba(20,35,31,.28);z-index:80;display:flex;justify-content:flex-end}
    .delivery-drawer{width:min(520px,100%);height:100%;background:var(--surface);border-left:1px solid var(--line);box-shadow:var(--shadow-lg);padding:24px;overflow-y:auto}
    .drawer-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px}
    .drawer-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:var(--surface-2);color:var(--muted);font-size:18px;line-height:1;cursor:pointer;flex:none}
    .drawer-title{font-size:24px;line-height:1.15;color:var(--ink);margin-top:5px}
    .drawer-section{border-top:1px solid var(--line-soft);padding-top:16px;margin-top:16px}
    .drawer-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .drawer-tile{background:var(--surface-2);border:1px solid var(--line-soft);border-radius:8px;padding:10px}
    .drawer-tile .k{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2);font-weight:600}
    .drawer-tile .v{font-size:13px;color:var(--ink);font-weight:650;margin-top:4px;line-height:1.35}
    .drawer-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
    .drawer-row{display:flex;justify-content:space-between;gap:12px;border:1px solid var(--line-soft);border-radius:8px;padding:9px 10px;background:var(--surface-2);font-size:12.5px}
    .drawer-linkgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    .drawer-link{border:1px solid var(--line-soft);border-radius:8px;background:var(--surface-2);padding:10px;text-align:left}
    .drawer-link b{display:block;font-size:12.5px;color:var(--ink)}
    .drawer-link span{display:block;font-size:11.5px;color:var(--muted-2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .agent-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
    .agent-action{border:1px solid var(--line);background:var(--surface-2);border-radius:8px;padding:9px 10px;text-align:left;cursor:pointer;font-family:inherit;color:var(--ink)}
    .agent-action:hover{border-color:var(--pine);box-shadow:var(--shadow-sm)}
    .agent-action:disabled{opacity:.6;cursor:default}
    .agent-action b{display:block;font-size:12.5px;line-height:1.25}
    .agent-action span{display:block;font-size:11.5px;color:var(--muted-2);margin-top:3px}
    .agent-output{background:var(--surface-2);border:1px solid var(--line-soft);border-radius:8px;padding:12px;margin-top:10px;font-size:12.5px;color:var(--ink);line-height:1.55;white-space:pre-wrap}
    .agent-output-error{background:#f8e8e5;border-color:#e4b4ad;color:#8f3228}
    .agent-output-running{background:var(--gold-tint);border-color:var(--gold-soft)}
    .agent-output-label{display:block;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2);font-weight:600;margin-top:3px}
    .content-create{margin-top:14px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:var(--shadow-sm)}
    .content-create-grid{display:grid;grid-template-columns:minmax(220px,1.4fr) 150px 170px 150px auto;gap:8px;align-items:start}
    .content-create textarea{min-height:74px;resize:vertical}
    .content-save{background:var(--pine);border:none;color:#fff;border-radius:8px;padding:9px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
    .content-save:disabled{opacity:.6;cursor:default}
    /* ---- Productivity cockpit ---- */
    .prod3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:start}
    .prod-col{display:flex;flex-direction:column;gap:14px;min-width:0}
    .sec-h{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
    .sec-h .t{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted-2);font-weight:600}
    .sec-h .x{font-size:11px;color:var(--muted-2)}
    .tline{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--line-soft)}
    .tline:last-child{border-bottom:none}
    .chk{flex:none;width:18px;height:18px;border-radius:6px;cursor:pointer;border:1.5px solid var(--muted-2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;line-height:1;transition:background .15s,border-color .15s}
    .chk.on{background:var(--pine);border-color:var(--pine)}
    .sch{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--line-soft)}
    .sch:last-child{border-bottom:none}
    .habit-dot{width:7px;height:7px;border-radius:50%;flex:none}
    .sticky{background:var(--gold-tint);border:1px solid var(--gold-soft);border-left:3px solid var(--gold);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--ink);line-height:1.45}
    @media(max-width:1160px){.grid-3{grid-template-columns:repeat(2,1fr)}.kan{grid-template-columns:repeat(2,1fr)}.prod3{grid-template-columns:1fr}.delivery-strip,.content-command{grid-template-columns:repeat(2,1fr)}.delivery-tools,.content-tools,.content-create-grid{grid-template-columns:1fr 1fr}.intel-list{grid-template-columns:1fr}.content-grid{grid-template-columns:1fr}}
    @media(max-width:760px){
      .rail{width:76px;min-width:76px;padding:18px 10px}
      .rail-brand{align-items:center;padding:0}
      .rail-mark{font-size:18px}
      .rail-tag,.nav-label,.rail-card div:not(.rail-av){display:none}
      .nav-item span{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}
      .rail-divider{margin:16px 6px}
      .nav-item{justify-content:center;padding:10px 0}
      .rail-foot{align-items:center}
      .rail-card{padding:8px}
      .topbar{padding:12px 14px;overflow:hidden}
      .crumb{white-space:normal;line-height:1.35}
      .grid-2,.delivery-grid,.delivery-strip,.delivery-tools,.content-command,.content-tools,.content-create-grid{grid-template-columns:1fr}
      .view-wrap{padding:24px 14px 48px}
      .delivery-action{align-items:flex-start;flex-direction:column}
      .delivery-stat .k,.delivery-stat .s{white-space:normal}
      .delivery-drawer-bg{left:76px}
      .delivery-drawer{padding:20px 16px}
      .drawer-grid,.drawer-linkgrid{grid-template-columns:1fr}
      .agent-actions{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;
const STATIC_PREVIEW_PORTS = new Set(["5179","5500","5501"]);
const DEFAULT_API = (window.location.protocol === "file:" || STATIC_PREVIEW_PORTS.has(window.location.port)) ? "http://localhost:8000" : window.location.origin;
const API = localStorage.getItem("cc_api_base") || DEFAULT_API;
const COMMAND_CENTRE_API_KEY = localStorage.getItem("cc_api_key") || "";
const nativeFetch = window.fetch.bind(window);
window.fetch = (input, init = {}) => {
  const rawUrl = typeof input === "string" ? input : input?.url;
  const url = rawUrl ? new URL(rawUrl, window.location.href) : null;
  const apiUrl = new URL(API, window.location.href);
  const shouldAuth = url && url.origin === apiUrl.origin && COMMAND_CENTRE_API_KEY;
  if (!shouldAuth) return nativeFetch(input, init);
  const headers = new Headers(init.headers || (typeof input !== "string" ? input.headers : undefined));
  if (!headers.has("X-API-Key")) headers.set("X-API-Key", COMMAND_CENTRE_API_KEY);
  return nativeFetch(input, {...init, headers});
};

const PROVIDER_COLORS = {anthropic:"#7c3aed",openai:"#059669",google:"#2563eb",ollama:"#ea580c",deepseek:"#db2777",none:"#64748b"};
const DEPT_EMOJI = {learning_design:"📚",academic_development:"🎓",marketing_sales:"📣",operations:"⚙️",research_intelligence:"🔬",support:"🛟",rag:"🔍",hybrid:"🔀"};

const fmtCost = v => v >= 0.001 ? `$${v.toFixed(4)}` : v > 0 ? "<$0.001" : "$0.00";
const fmtMs   = ms => ms >= 1000 ? `${(ms/1000).toFixed(1)}s` : `${ms}ms`;
const fmtDate = ts => new Date(ts*1000).toLocaleString('en-AU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});

// ── Service dot ────────────────────────────────────────────────────────────
function ServiceDot({port, label, url}) {
  const [ok,setOk] = useState(null);
  const target = url || `http://localhost:${port}/health`;
  useEffect(() => {
    const check = () => fetch(target,{signal:AbortSignal.timeout(2500)})
      .then(r=>setOk(r.ok)).catch(()=>setOk(false));
    check(); const t=setInterval(check,20000); return()=>clearInterval(t);
  },[target]);
  return (
    <span title={label} style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:11,color:'var(--muted)'}}>
      <span style={{width:7,height:7,borderRadius:'50%',background:ok===null?'#555':ok?'var(--green)':'var(--red)',display:'inline-block'}}/>
      {label}
    </span>
  );
}

// ── Session list ───────────────────────────────────────────────────────────
function SessionSidebar({currentId, onSelect, onNew, tick}) {
  const [sessions,setSessions]=useState([]);
  const load = useCallback(()=>{
    fetch(`${API}/sessions`).then(r=>r.json()).then(setSessions).catch(()=>{});
  },[]);
  useEffect(()=>{load();},[tick]);

  const del=(id,e)=>{
    e.stopPropagation();
    fetch(`${API}/sessions/${id}`,{method:'DELETE'}).then(load);
    if(id===currentId) onNew();
  };

  return (
    <div style={{width:220,minWidth:220,background:'var(--bg2)',borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{padding:'12px 10px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:12,fontWeight:600,color:'var(--muted)',letterSpacing:1}}>CONVERSATIONS</span>
        <button onClick={onNew} style={{background:'var(--accent)',border:'none',color:'#fff',borderRadius:6,padding:'3px 10px',fontSize:12,cursor:'pointer'}}>+ New</button>
      </div>
      <div style={{overflowY:'auto',flex:1}}>
        {sessions.length===0&&<div style={{padding:20,fontSize:12,color:'var(--muted)',textAlign:'center'}}>No conversations yet</div>}
        {sessions.map(s=>(
          <div key={s.id} className={`session-item${s.id===currentId?' active':''}`} onClick={()=>onSelect(s.id)}>
            <div style={{fontSize:12,fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{s.title}</div>
            <div style={{fontSize:10,color:'var(--muted)',marginTop:3,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span>{fmtDate(s.updated_at)}</span>
              <button onClick={e=>del(s.id,e)} style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:11,padding:0,lineHeight:1}}>✕</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Message bubble ─────────────────────────────────────────────────────────
function Bubble({msg}) {
  const isUser = msg.role==='user';
  const pColor = PROVIDER_COLORS[msg.provider]||'#aaa';
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:isUser?'flex-end':'flex-start',marginBottom:18}}>
      {!isUser&&(
        <div style={{display:'flex',gap:7,marginBottom:6,alignItems:'center',flexWrap:'wrap'}}>
          {msg.dept&&<span>{DEPT_EMOJI[msg.dept]||'🤖'}</span>}
          {msg.provider&&(
            <span className="pill" style={{background:pColor+'22',color:pColor,border:`1px solid ${pColor}44`}}>
              {msg.modelLabel||msg.provider}
            </span>
          )}
          {msg.cost_usd>0&&<span className="pill" style={{background:'rgba(31,122,82,.12)',color:'var(--green)',border:'1px solid rgba(31,122,82,.28)'}}>{fmtCost(msg.cost_usd)}</span>}
          {msg.latency_ms>0&&<span style={{fontSize:10,color:'var(--muted)'}}>{fmtMs(msg.latency_ms)}</span>}
          {msg.memory&&<span className="pill" style={{background:'#7c3aed14',color:'#7c3aed',border:'1px solid #7c3aed33'}}>🧠 memory</span>}
        </div>
      )}
      {!isUser&&msg.tools&&msg.tools.length>0&&(
        <div style={{display:'flex',gap:6,marginBottom:6,flexWrap:'wrap'}}>
          {msg.tools.map((t,i)=>(
            <span key={i} className="pill" style={{background:'#0284c714',color:'#0284c7',border:'1px solid #0284c733'}}>
              {t.status==='running'?'⚙ running':t.status==='done'?'✓ ran':'✕ failed'} · {t.name}
            </span>
          ))}
        </div>
      )}
      <div style={{
        maxWidth:'80%',padding:'11px 15px',fontSize:14,lineHeight:1.65,whiteSpace:'pre-wrap',wordBreak:'break-word',
        borderRadius:isUser?'16px 16px 4px 16px':'16px 16px 16px 4px',
        background:isUser?'var(--pine)':'var(--bg2)',
        color:isUser?'#f3f7f4':'var(--text)',
        border:isUser?'none':'1px solid var(--line)',
        boxShadow:isUser?'0 4px 14px rgba(20,35,31,.22)':'var(--shadow-sm)',
      }}>
        {msg.content}
        {msg.streaming&&<span className="typing-cursor"/>}
      </div>
    </div>
  );
}

// ── Cost modal ─────────────────────────────────────────────────────────────
function CostModal({onClose}) {
  const [data,setData]=useState(null);
  useEffect(()=>{fetch(`${API}/cost`).then(r=>r.json()).then(setData).catch(()=>{});},[]);
  if(!data) return <div className="modal-bg" onClick={onClose}><div style={{background:'var(--bg2)',padding:32,borderRadius:16,boxShadow:'var(--shadow-lg)'}}>Loading…</div></div>;
  const providers = Object.entries(data.by_provider||{});
  const maxCost = Math.max(...providers.map(([,v])=>v.cost_usd),.0001);
  return (
    <div className="modal-bg" onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:'var(--bg2)',borderRadius:16,border:'1px solid var(--border)',width:600,maxHeight:'80vh',overflow:'auto',padding:24,boxShadow:'var(--shadow-lg)'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:20}}>
          <h2 style={{fontSize:18,fontWeight:700}}>💰 Session Cost</h2>
          <button onClick={onClose} style={{background:'none',border:'none',color:'var(--muted)',fontSize:20,cursor:'pointer'}}>✕</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:20}}>
          {[['Total',fmtCost(data.total_cost_usd||0)],['Calls',data.total_calls||0],['Tokens',((data.total_tokens||0)/1000).toFixed(1)+'k']].map(([k,v])=>(
            <div key={k} style={{background:'var(--bg3)',padding:14,borderRadius:10,border:'1px solid var(--border)',textAlign:'center'}}>
              <div style={{fontSize:22,fontWeight:700,color:'var(--accent)'}}>{v}</div>
              <div style={{fontSize:11,color:'var(--muted)'}}>{k}</div>
            </div>
          ))}
        </div>
        {providers.map(([prov,info])=>(
          <div key={prov} style={{marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4,fontSize:13}}>
              <span style={{color:PROVIDER_COLORS[prov]||'var(--text)'}}>{prov}</span>
              <span style={{color:'var(--muted)'}}>{info.calls} calls · {fmtCost(info.cost_usd)}</span>
            </div>
            <div style={{height:6,background:'var(--bg3)',borderRadius:3}}>
              <div style={{height:'100%',background:PROVIDER_COLORS[prov]||'var(--accent)',borderRadius:3,width:`${(info.cost_usd/maxCost)*100}%`,transition:'width .4s'}}/>
            </div>
          </div>
        ))}
        {(data.recent||[]).slice(0,8).map((c,i)=>(
          <div key={i} style={{display:'flex',gap:8,fontSize:11,padding:'4px 0',borderBottom:'1px solid var(--border)',alignItems:'center'}}>
            <span className="pill" style={{background:(PROVIDER_COLORS[c.provider]||'#555')+'22',color:PROVIDER_COLORS[c.provider]||'#aaa'}}>{c.model_label}</span>
            <span style={{color:'var(--muted)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{(c.query||'').slice(0,50)}</span>
            <span style={{color:'var(--green)'}}>{fmtCost(c.cost_usd)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Admin / Usage view ─────────────────────────────────────────────────────
function AdminView() {
  const [data,setData]=useState(null);
  useEffect(()=>{fetch(`${API}/usage/monthly?months=12`).then(r=>r.json()).then(setData).catch(()=>{});},[]);
  if(!data) return <div style={{padding:40,color:'var(--muted)'}}>Loading usage…</div>;
  const months = data.months||[];
  const maxMonthCost = Math.max(...months.map(m=>m.cost_usd),.0001);

  return (
    <div style={{flex:1,overflowY:'auto',padding:'24px 28px'}}>
      <div style={{maxWidth:900,margin:'0 auto'}}>
        <h2 style={{fontSize:20,fontWeight:700,marginBottom:4}}>📊 Usage & Cost</h2>
        <div style={{fontSize:13,color:'var(--muted)',marginBottom:20}}>
          Lifetime: {fmtCost(data.lifetime_cost||0)} across {data.lifetime_calls||0} calls
        </div>

        {months.length===0&&<div style={{color:'var(--muted)'}}>No usage recorded yet. Send a few queries and come back.</div>}

        {/* Monthly cost bars */}
        {months.length>0&&(
          <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:12,padding:18,marginBottom:18,boxShadow:'var(--shadow-sm)'}}>
            <div style={{fontSize:13,fontWeight:600,color:'var(--muted)',marginBottom:14}}>MONTHLY SPEND</div>
            {months.map(m=>(
              <div key={m.month} style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:4}}>
                  <span>{m.month}</span>
                  <span style={{color:'var(--muted)'}}>{m.calls} calls · {(m.total_tokens/1000).toFixed(1)}k tok · {fmtCost(m.cost_usd)}</span>
                </div>
                <div style={{height:8,background:'var(--bg3)',borderRadius:4}}>
                  <div style={{height:'100%',background:'var(--accent)',borderRadius:4,width:`${(m.cost_usd/maxMonthCost)*100}%`,transition:'width .4s'}}/>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* Latest month breakdowns */}
        {months[0]&&(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            <Breakdown title={`BY PROVIDER · ${months[0].month}`} obj={months[0].by_provider} colorMap={PROVIDER_COLORS}/>
            <Breakdown title={`BY DEPARTMENT · ${months[0].month}`} obj={months[0].by_department}/>
            <div style={{gridColumn:'1 / span 2'}}>
              <Breakdown title={`BY MODEL · ${months[0].month}`} obj={months[0].by_model}/>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function Breakdown({title, obj, colorMap}) {
  const entries = Object.entries(obj||{}).sort((a,b)=>b[1].cost_usd-a[1].cost_usd);
  const max = Math.max(...entries.map(([,v])=>v.cost_usd),.0001);
  return (
    <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:12,padding:16,boxShadow:'var(--shadow-sm)'}}>
      <div style={{fontSize:12,fontWeight:600,color:'var(--muted)',marginBottom:12,letterSpacing:.5}}>{title}</div>
      {entries.length===0&&<div style={{fontSize:12,color:'var(--muted)'}}>None</div>}
      {entries.map(([k,v])=>{
        const c = colorMap?.[k]||'var(--accent)';
        return (
          <div key={k} style={{marginBottom:9}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}>
              <span style={{color:colorMap?c:'var(--text)'}}>{k}</span>
              <span style={{color:'var(--muted)'}}>{v.calls} · {fmtCost(v.cost_usd)}</span>
            </div>
            <div style={{height:5,background:'var(--bg3)',borderRadius:3}}>
              <div style={{height:'100%',background:c,borderRadius:3,width:`${(v.cost_usd/max)*100}%`}}/>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── n8n automations view ───────────────────────────────────────────────────
function N8nView() {
  const [health,setHealth]=useState(null);
  const [tools,setTools]=useState(null);
  const [err,setErr]=useState(null);
  const [args,setArgs]=useState({});
  const [running,setRunning]=useState(null);
  const [results,setResults]=useState({});

  const load=()=>{
    fetch(`${API}/n8n/health`).then(r=>r.json()).then(setHealth).catch(()=>setHealth({status:'down'}));
    fetch(`${API}/n8n/tools`).then(r=>r.ok?r.json():r.json().then(e=>Promise.reject(e)))
      .then(d=>{setTools(d.tools||[]);setErr(null);})
      .catch(e=>setErr(e.detail||'Could not reach n8n'));
  };
  useEffect(()=>{load();},[]);

  const run=async(name)=>{
    setRunning(name);
    let parsed={};
    try{ if(args[name]&&args[name].trim()) parsed=JSON.parse(args[name]); }
    catch{ setResults(r=>({...r,[name]:'⚠ Arguments must be valid JSON'})); setRunning(null); return; }
    try{
      const resp=await fetch(`${API}/n8n/call`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,arguments:parsed})});
      const d=await resp.json();
      setResults(r=>({...r,[name]: typeof d.content==='string'?d.content:JSON.stringify(d.content,null,2)}));
    }catch{ setResults(r=>({...r,[name]:'Call failed'})); }
    finally{ setRunning(null); }
  };

  return (
    <div style={{flex:1,overflowY:'auto',padding:'24px 28px'}}>
      <div style={{maxWidth:860,margin:'0 auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
          <h2 style={{fontSize:20,fontWeight:700}}>🔌 n8n Automations</h2>
          <button onClick={load} style={{background:'var(--bg3)',border:'1px solid var(--border)',color:'var(--text)',borderRadius:8,padding:'5px 12px',fontSize:12,cursor:'pointer'}}>Refresh</button>
        </div>
        <div style={{fontSize:13,marginBottom:18}}>
          {health&&<span style={{color:health.status==='ok'?'var(--green)':'var(--red)'}}>
            {health.status==='ok'?'● Connected':'● Not connected'} </span>}
          <span style={{color:'var(--muted)'}}>{health?.url}</span>
          {health?.auth&&<span style={{color:'var(--muted)'}}> · authed</span>}
        </div>

        {err&&<div style={{background:'#ef444422',border:'1px solid #ef444444',color:'#fca5a5',borderRadius:10,padding:14,fontSize:13,lineHeight:1.5}}>
          {err}<br/><span style={{color:'var(--muted)'}}>Check that n8n is running, the MCP Server Trigger workflow is active, and N8N_MCP_TOKEN in .env matches.</span>
        </div>}

        {tools&&tools.length===0&&!err&&<div style={{color:'var(--muted)',fontSize:13}}>Connected, but no workflow tools are exposed. Activate a workflow with an MCP Server Trigger node.</div>}

        {(tools||[]).map(t=>(
          <div key={t.name} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:12,padding:16,marginBottom:12,boxShadow:'var(--shadow-sm)'}}>
            <div style={{fontSize:15,fontWeight:700}}>{t.name}</div>
            {t.description&&<div style={{fontSize:13,color:'var(--muted)',marginTop:4,lineHeight:1.5}}>{t.description}</div>}
            <textarea value={args[t.name]||''} onChange={e=>setArgs(a=>({...a,[t.name]:e.target.value}))}
              placeholder='Arguments as JSON, e.g. {"name":"value"} — leave blank if none'
              rows={2}
              style={{width:'100%',marginTop:10,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 10px',color:'var(--text)',fontSize:12,fontFamily:'monospace',resize:'vertical'}}/>
            <div style={{display:'flex',gap:10,alignItems:'center',marginTop:8}}>
              <button onClick={()=>run(t.name)} disabled={running===t.name} style={{background:'var(--accent)',border:'none',color:'#fff',borderRadius:8,padding:'6px 16px',fontSize:13,fontWeight:600,cursor:'pointer'}}>
                {running===t.name?'Running…':'▶ Run'}
              </button>
            </div>
            {results[t.name]&&(
              <pre style={{marginTop:10,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 12px',fontSize:12,maxHeight:240,overflow:'auto',whiteSpace:'pre-wrap'}}>{results[t.name]}</pre>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Self-Improve (Self-Harness) view ───────────────────────────────────────
function HarnessView() {
  const [proposals,setProposals]=useState([]);
  const [running,setRunning]=useState(false);
  const [lastRun,setLastRun]=useState(null);
  const [busy,setBusy]=useState(null);

  const load=()=>fetch(`${API}/harness/proposals?status=pending`).then(r=>r.json()).then(setProposals).catch(()=>{});
  useEffect(()=>{load();},[]);

  const run=async()=>{
    setRunning(true); setLastRun(null);
    try{
      const r=await fetch(`${API}/harness/run`,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
      const d=await r.json();
      setLastRun(d);
      load();
    }catch{ setLastRun({error:'Run failed — is the orchestrator up?'}); }
    finally{ setRunning(false); }
  };

  const decide=async(pid,action)=>{
    setBusy(pid);
    try{ await fetch(`${API}/harness/proposals/${pid}/${action}`,{method:'POST'}); }catch{}
    setBusy(null); load();
  };

  return (
    <div style={{flex:1,overflowY:'auto',padding:'24px 28px'}}>
      <div style={{maxWidth:860,margin:'0 auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
          <h2 style={{fontSize:20,fontWeight:700}}>🧬 Self-Improve</h2>
          <button onClick={run} disabled={running} style={{background:running?'var(--bg3)':'var(--accent)',border:'none',color:'#fff',borderRadius:10,padding:'8px 16px',fontSize:13,fontWeight:600,cursor:running?'default':'pointer'}}>
            {running?'Running loop…':'Run optimization loop'}
          </button>
        </div>
        <div style={{fontSize:13,color:'var(--muted)',marginBottom:18,lineHeight:1.5}}>
          The loop runs your agents on a held-out task set, finds recurring weaknesses against your style rules, drafts a fix, and regression-tests it. Winners appear below for your approval — nothing changes until you accept.
        </div>

        {running&&<div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:16,marginBottom:16,fontSize:13,color:'var(--muted)'}}>Running mining → proposal → validation across departments. This makes several model calls and can take a minute or two…</div>}

        {lastRun&&!lastRun.error&&(
          <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:16,marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:600,marginBottom:8}}>Last run: {lastRun.proposals_queued} proposal(s) queued across {lastRun.departments} departments</div>
            {(lastRun.results||[]).map((r,i)=>(
              <div key={i} style={{fontSize:12,color:'var(--muted)',padding:'3px 0'}}>

              <span style={{fontSize:12,color:'var(--muted)'}}>weakness: {p.failure_pattern}</span>

            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

const SEED_DELIVERABLES = [
  {title:"Online retention: sector benchmark and drivers", cap:"Sector Intelligence & Evidence", type:"PDF briefing", status:"Reviewed", st:"st-good", meta:"18 pages · 12 Jun"},
  {title:"MPH curriculum map and outcomes alignment", cap:"Learning & Curriculum Design", type:"Curriculum map", status:"Draft for review", st:"st-warn", meta:"9 Jun"},
  {title:"Academic operations: options analysis for council", cap:"Strategy & Change Advisory", type:"Decision paper", status:"Reviewed", st:"st-good", meta:"11 pages · 5 Jun"},
  {title:"Online teaching capability, facilitation guide", cap:"Academic Capability & Leadership", type:"Facilitation guide", status:"Reviewed", st:"st-good", meta:"24 pages · 1 Jun"},
];
const normText = v => String(v||'').toLowerCase();
const uniq = arr => Array.from(new Set((arr||[]).filter(Boolean))).sort((a,b)=>a.localeCompare(b));
function scoreDeliverable({readiness,evidence,quality,reuse_score,status}){
  let score = 35;
  if(readiness === 'Client-ready') score += 30;
  else if(readiness === 'Internal-ready') score += 18;
  else if(readiness === 'Needs review') score += 8;
  else if(readiness === 'Blocked') score -= 14;
  if(/strong/i.test(evidence)) score += 16;
  else if(/partial/i.test(evidence)) score += 6;
  else if(/missing|check/i.test(evidence)) score -= 6;
  score += Object.values(quality||{}).filter(Boolean).length * 8;
  if((reuse_score||0) >= 70) score += 6;
  if(/draft|waiting|blocked/i.test(status)) score -= 4;
  return Math.max(0, Math.min(100, score));
}
function intelligenceForDeliverable(d){
  const recs = [];
  const add=(priority,title,detail,type='action')=>recs.push({priority,title,detail,type});
  if(!d.quality.reviewed) add(1,"Run quality review","Review status, acceptance checks, and reviewer notes before this moves into a client-ready state.");
  if(!d.quality.evidence_checked) add(2,"Check evidence coverage","Confirm the sources are linked and strong enough for the claims this deliverable makes.");
  if(!d.quality.brand_checked) add(3,"Run brand and format check","Confirm tone, structure, and final packaging before handoff or reuse.");
  if(d.readiness === 'Client-ready') add(4,"Prepare client handoff","Create a short handoff note, recommended use, and any caveats before sending.");
  if((d.reuse_score||0) >= 70) add(5,"Reuse as source asset","Turn this into a reusable template, content idea, or future proposal evidence block.","reuse");
  if(!d.production_id && d.source !== 'Production') add(6,"Link production history","Connect this artifact to a production or engagement record so its origin is traceable.","trace");
  if(d.readiness === 'Blocked') add(0,"Resolve active blocker","Clear the governance or evidence blocker before any downstream action.","risk");
  if(recs.length === 0) add(7,"Archive with metadata","This looks stable. Preserve the source, quality state, and reuse tags for retrieval.");
  return recs.sort((a,b)=>a.priority-b.priority).slice(0,4);
}
const DELIVERY_AGENT_ACTIONS = [
  {key:"summary", title:"Generate handoff summary", hint:"Client-ready brief", subagent:"responder-agent", department:"support"},
  {key:"quality", title:"Run quality review", hint:"Acceptance checks", subagent:"quality-reviewer", department:"operations"},
  {key:"evidence", title:"Check evidence", hint:"Claims and sources", subagent:"research-producer", department:"content_studio"},
  {key:"reuse", title:"Find reuse paths", hint:"Content and templates", subagent:"content-creator", department:"marketing_sales"},
  {key:"task", title:"Create follow-up task", hint:"Operating layer", local:true},
  {key:"memory", title:"Save project memory", hint:"Reusable context", local:true},
];
function deliveryActionPrompt(action,item){
  const brief = [
    `Deliverable: ${item.title}`,
    `Capability: ${item.cap}`,
    `Type: ${item.type || 'Artifact'}`,
    `Status: ${item.status}`,
    `Readiness: ${item.readiness}`,
    `Evidence: ${item.evidence}`,
    `Score: ${item.intelligence_score}/100`,
    `Recommended next action: ${item.next_action}`,
  ].join("\n");
  const guardrail = "Use only the deliverable metadata above. Do not invent names, clients, attachments, dates, page contents, evidence, approvals, or correspondence. If detail is missing, say it is not recorded. Return concise bullets, not an email.";
  if(action.key === "summary") return `${brief}\n\n${guardrail}\nCreate a concise handoff summary with purpose, how to use it, caveats, and next step.`;
  if(action.key === "quality") return `${brief}\n\n${guardrail}\nRun a quality review. Return pass/fail signals for evidence, structure, audience fit, brand voice, and client readiness.`;
  if(action.key === "evidence") return `${brief}\n\n${guardrail}\nCheck evidence coverage. Identify likely claim risks, missing source links, and what evidence should be attached before handoff.`;
  if(action.key === "reuse") return `${brief}\n\n${guardrail}\nSuggest reuse opportunities: templates, content posts, proposal evidence, future client assets, and retrieval tags.`;
  return brief;
}
function localDeliveryOutput(action,item){
  if(action.key === "summary") return `Purpose: ${item.title}\nUse: ${item.type || 'Artifact'} for ${item.cap} work where this evidence or structure applies.\nReadiness: ${item.readiness} (${item.intelligence_score}/100).\nCaveat: ${item.evidence}.\nNext: ${item.next_action}.`;
  if(action.key === "quality") return `Quality review draft\n- Review: ${item.quality.reviewed ? 'ready' : 'needs review'}\n- Evidence: ${item.quality.evidence_checked ? 'ready' : 'check sources'}\n- Brand: ${item.quality.brand_checked ? 'ready' : 'check tone and format'}\nDecision: ${item.readiness === 'Client-ready' ? 'Suitable for handoff after final operator glance.' : 'Hold until checks are complete.'}`;
  if(action.key === "evidence") return `Evidence check draft\n- Current signal: ${item.evidence}\n- Risk: ${item.risk}\n- Required action: ${item.quality.evidence_checked ? 'Preserve source links in metadata.' : 'Attach source notes and verify claims before client use.'}`;
  if(action.key === "reuse") return `Reuse paths\n- Template: preserve structure as a reusable ${item.type || 'artifact'} pattern.\n- Content: convert core insight into a short post or article.\n- Retrieval: tag under ${item.cap} and delivery evidence.\n- Sales: use as proof point where the client problem matches.`;
  return item.next_action;
}
function inferDeliverable(d){
  const status = d.status || d.stl || "Unknown";
  const statusKey = normText(status);
  const st = d.st || (statusKey.includes('review') || statusKey.includes('approved') || statusKey.includes('sent') ? 'st-good' : statusKey.includes('draft') || statusKey.includes('waiting') ? 'st-warn' : statusKey.includes('block') ? 'st-fail' : 'st-mute');
  const readiness = d.readiness || (statusKey.includes('approved') || statusKey.includes('sent') || statusKey === 'reviewed' ? 'Client-ready' : statusKey.includes('review') ? 'Internal-ready' : statusKey.includes('draft') ? 'Needs review' : statusKey.includes('block') ? 'Blocked' : 'Needs triage');
  const evidence = d.evidence_status || d.evidence || (readiness === 'Client-ready' ? 'Strong evidence' : readiness === 'Needs review' ? 'Check evidence' : 'Partial evidence');
  const confidence = d.confidence || (readiness === 'Client-ready' ? 'High' : readiness === 'Blocked' ? 'Low' : 'Medium');
  const source = d.source || d.pipeline || (d.production_id ? 'Production' : 'Reviewed store');
  const next_action = d.next_action || (readiness === 'Client-ready' ? 'Prepare client handoff' : readiness === 'Needs review' || readiness === 'Internal-ready' ? 'Send to quality review' : readiness === 'Blocked' ? 'Resolve blocker' : 'Triage readiness');
  const reuse_score = d.reuse_score ?? (readiness === 'Client-ready' ? 78 : readiness === 'Internal-ready' ? 58 : 34);
  const updated = d.updated_at || d.meta || "No date";
  const id = d.id || d.deliverable_id || d.title;
  const quality = {
    reviewed: d.quality?.reviewed ?? (/reviewed|approved|sent/i.test(status) && !/draft|for review|needs review/i.test(status)),
    evidence_checked: d.quality?.evidence_checked ?? /strong/i.test(evidence),
    brand_checked: d.quality?.brand_checked ?? readiness === 'Client-ready',
  };
  const evidenceItems = d.evidence_items || d.sources || [
    {label:evidence, detail:/strong/i.test(evidence) ? "Evidence coverage is sufficient for handoff." : "Review source coverage before client use."},
  ];
  const related = [
    {label:"Production", value:d.production_id || (source === 'Production' ? "Pipeline record" : "No production record")},
    {label:"Quality", value:quality.reviewed ? "Review passed or recorded" : "Quality review needed"},
    {label:"Governance", value:d.governance_status || (readiness === 'Blocked' ? "Gate pending" : "No active gate")},
    {label:"Knowledge", value:/strong/i.test(evidence) ? "Evidence linked" : "Evidence link needed"},
    {label:"Memory", value:d.project || d.client || "No project memory linked"},
    {label:"Content", value:(reuse_score >= 70) ? "Good candidate for reuse" : "Low reuse signal"},
  ];
  const history = d.history || d.events || [
    {label:"Status", detail:status, at:updated},
    {label:"Readiness", detail:readiness, at:"Current"},
  ];
  const base = {...d,id,status,st,readiness,evidence,confidence,source,next_action,reuse_score,updated,quality,evidenceItems,related,history};
  const intelligence_score = d.intelligence_score ?? scoreDeliverable(base);
  const risk = intelligence_score >= 82 ? "Low" : intelligence_score >= 62 ? "Medium" : "High";
  const recommendations = d.recommendations || intelligenceForDeliverable({...base,intelligence_score,risk});
  return {...base,intelligence_score,risk,recommendations};
}
function DeliverableDrawer({item,onClose}){
  const [busy,setBusy]=useState("");
  const [outputs,setOutputs]=useState({});
  useEffect(()=>{setBusy("");setOutputs({});},[item?.id]);
  if(!item) return null;
  const checks=[
    ["Review",item.quality.reviewed],
    ["Evidence",item.quality.evidence_checked],
    ["Brand",item.quality.brand_checked],
  ];
  const runAgentAction=async(action)=>{
    setBusy(action.key);
    setOutputs(o=>({...o,[action.key]:"Running..."}));
    try{
      if(action.key === "task"){
        const resp=await fetch(`${API}/operating/tasks`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
          title:item.next_action,
          type:'agent',
          status:'todo',
          assignee:'Command Centre',
          priority:item.risk==='High'?5:item.risk==='Medium'?4:3,
          target_id:item.id,
          note:`Deliverable: ${item.title}`,
          meta:{source:'deliverables',deliverable:item.title,readiness:item.readiness,score:item.intelligence_score}
        })});
        if(!resp.ok) throw new Error("Task service unavailable");
        const d=await resp.json();
        setOutputs(o=>({...o,[action.key]:`Follow-up task created: ${d.task_id}`}));
        return;
      }
      if(action.key === "memory"){
        const project=item.project || item.client || item.cap || "Deliverables";
        const resp=await fetch(`${API}/operating/project-memory`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
          project,
          content:`${item.title}: ${item.readiness}; ${item.evidence}; next action: ${item.next_action}`,
          source:'deliverables',
          meta:{deliverable:item.id,score:item.intelligence_score,risk:item.risk}
        })});
        if(!resp.ok) throw new Error("Memory service unavailable");
        const d=await resp.json();
        setOutputs(o=>({...o,[action.key]:`Project memory saved: ${d.memory_id}`}));
        return;
      }
      const prompt=deliveryActionPrompt(action,item);
      const resp=await fetch(`${API}/wijerco`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        query:prompt,
        department:action.department,
        subagent:action.subagent,
        session_id:`deliverable-${item.id}-${action.key}`,
        conversation_history:[]
      })});
      if(!resp.ok) throw new Error("Agent service unavailable");
      const d=await resp.json();
      setOutputs(o=>({...o,[action.key]:d.answer || localDeliveryOutput(action,item)}));
    }catch(e){
      setOutputs(o=>({...o,[action.key]:localDeliveryOutput(action,item)}));
    }finally{
      setBusy("");
    }
  };
  return (
    <div className="delivery-drawer-bg" onClick={onClose}>
      <aside className="delivery-drawer" onClick={e=>e.stopPropagation()} aria-label="Deliverable detail">
        <div className="drawer-top">
          <div>
            <div className="cap-tag">{item.cap}</div>
            <h2 className="serif drawer-title">{item.title}</h2>
            <div className="delivery-meta">
              <span className={"stag "+item.st}>{item.status}</span>
              <span className={"stag "+(item.readiness==='Client-ready'?'st-good':item.readiness==='Blocked'?'st-fail':item.readiness.includes('review')?'st-warn':'st-mute')}>{item.readiness}</span>
              <span className="tagx">{item.type || 'Artifact'}</span>
            </div>
          </div>
          <button className="drawer-close" onClick={onClose} aria-label="Close deliverable detail">×</button>
        </div>

        <div className="drawer-grid">
          <div className="drawer-tile"><div className="k">Score</div><div className="v">{item.intelligence_score}/100 · {item.risk} risk</div></div>
          <div className="drawer-tile"><div className="k">Confidence</div><div className="v">{item.confidence}</div></div>
          <div className="drawer-tile"><div className="k">Reuse</div><div className="v">{item.reuse_score}/100</div></div>
          <div className="drawer-tile"><div className="k">Source</div><div className="v">{item.source}</div></div>
          <div className="drawer-tile"><div className="k">Updated</div><div className="v">{item.updated}</div></div>
        </div>

        <div className="drawer-section">
          <div className="sec-h"><span className="t">Recommended next action</span><span className="x">system</span></div>
          <div className="sticky">{item.next_action}</div>
        </div>

        <div className="drawer-section">
          <div className="sec-h"><span className="t">Agentic actions</span><span className="x">{busy?'running':'ready'}</span></div>
          <div className="agent-actions">
            {DELIVERY_AGENT_ACTIONS.map(a=>(
              <button key={a.key} className="agent-action" disabled={!!busy} onClick={()=>runAgentAction(a)}>
                <b>{busy===a.key?'Running...':a.title}</b>
                <span>{a.hint}</span>
              </button>
            ))}
          </div>
          {Object.entries(outputs).map(([k,v])=><div key={k} className="agent-output"><b>{(DELIVERY_AGENT_ACTIONS.find(a=>a.key===k)||{}).title || k}</b>{"\n"}{v}</div>)}
        </div>

        <div className="drawer-section">
          <div className="sec-h"><span className="t">System recommendations</span><span className="x">{(item.recommendations||[]).length}</span></div>
          <div className="drawer-list">
            {(item.recommendations||[]).map((r,i)=><div key={i} className="drawer-row"><span><b>{r.title}</b><div className="mini" style={{whiteSpace:'normal'}}>{r.detail}</div></span><span className={"stag "+(r.type==='risk'?'st-fail':r.type==='reuse'?'st-good':'st-warn')}>{r.type}</span></div>)}
          </div>
        </div>

        <div className="drawer-section">

          <div className="drawer-list">
            {checks.map(([label,ok])=><div key={label} className="drawer-row"><span>{label}</span><span className={"stag "+(ok?'st-good':'st-warn')}>{ok?'ready':'check'}</span></div>)}
          </div>
        </div>

          <div className="sec-h"><span className="t">Evidence</span><span className="x">{item.evidence}</span></div>

          </div>

function contentStatusClass(stage,item){
  if(stage === "Published") return "st-good";
  if(stage === "Ready") return /strong|high|review/i.test(item.engagement||item.m||item.signal||'') ? "st-good" : "st-mute";
  if(stage === "Editing") return "st-warn";
  if(/needs|partial|source|gap/i.test(item.evidence||'')) return "st-warn";
  return "st-good";
}
function scoreContentItem(item,stage){
  let score = Number(item.priority ?? 54);
  if(stage === "Drafts") score += 8;
  if(stage === "Editing") score += 5;
  if(stage === "Ready") score += /strong|3\.1k|views|reads|review/i.test(item.engagement+' '+item.m+' '+item.signal) ? 9 : 3;
  if(stage === "Published") score += 3;
  if(/high/i.test(item.confidence||'')) score += 5;
  if(/needs|missing/i.test(item.evidence||'')) score -= 8;
  if(/low/i.test(item.effort||'')) score += 4;
  return Math.max(0,Math.min(100,score));
}
function contentActionsFor(item,stage){
  const actions=[];
  const add=(key,label,detail)=>actions.push({key,label,detail});
  if(stage==="Ideas"){
    add("expand_idea","Expand idea",`Shape this into a ${item.format || item.p || 'content'} angle for ${item.audience || 'the target audience'}.`);
    add("find_evidence","Find evidence",/strong|performance/i.test(item.evidence||'') ? "Attach the strongest source to the card." : "Add source material before drafting.");
    add("recommend_format","Recommend format",`${item.p || 'LinkedIn'} remains the best first channel for this audience.`);
  } else if(stage==="Drafts"){
    add("improve_hook","Improve hook","Open with the tension, not the topic.");
    add("voice_check","Voice check","Tighten the argument against the established thought-leadership style.");
    add("move_to_editing","Move to editing","Send this through the voice pass once the draft is coherent.");
  } else if(stage==="Editing"){
    add("tighten_voice","Tighten voice","Make the piece sharper, cleaner, and closer to the intended audience.");
    add("prepare_qa","Prepare QA","Confirm claims, evidence, and format before moving to ready.");
    add("resolve_gaps","Resolve gaps",`Address ${item.evidence || 'any evidence gaps'} before review.`);
  } else if(stage==="Ready") {
    add("qa_review","QA review","Check claims, audience fit, format, and brand readiness.");
    add("publish","Publish","Record publication details and move this piece to 04_Published.");
    add("prepare_publish_handoff","Prepare publish handoff","Preserve final notes and publish guidance in the Markdown file.");
  } else {
    add("record_outcome","Record outcome","Capture publish URL, performance signal, and follow-up opportunity.");
    add("archive_learning","Archive learning","Keep final notes in the vault for reuse.");
  }
  return actions;
}
function inferContentItem(item,stage,index){
  const title=item.t || item.title || "Untitled content";
  const pillar=item.pillar || item.theme || (/AI|agent/i.test(title) ? "AI in academic operations" : /TEQSA|teaching|Andragogy/i.test(title) ? "Teaching quality and regulation" : /micro/i.test(title) ? "Micro-credentials and workforce demand" : "University leadership");
  const out={
    ...item,
    id:item.id || `${stage}-${index}-${title}`,
    t:title,
    p:item.p || item.platform || item.channel || "LinkedIn",
    pillar,
    audience:item.audience || "Education leaders",
    intent:item.intent || (stage==="Ready" ? "Review" : stage==="Published" ? "Published" : "Educate"),
    format:item.format || item.type || item.p || "Post",
    confidence:item.confidence || (stage==="Ideas" ? "Medium" : "High"),
    effort:item.effort || (stage==="Ideas" ? "Medium" : "Low"),
    source:item.source || (stage==="Ready" || stage==="Published" ? "Writing pipeline" : stage),
    evidence:item.evidence || (stage==="Ideas" ? "Needs source" : "Partial"),
    next_action:item.next_action || (stage==="Published" ? "Record performance and follow-up ideas." : stage==="Ready" ? "Run final QA review before publishing." : "Move this item to its next useful state."),
    signal:item.signal || (stage==="Published" ? "Published" : stage==="Ready" ? "Ready for QA" : stage==="Drafts" ? "Needs polish" : "Priority candidate"),
    due:item.due || item.m || "",
    stage,
  };
  out.score=scoreContentItem(out,stage);
  out.st=contentStatusClass(stage,out);
  out.actions=item.actions || contentActionsFor(out,stage);
  out.related=item.related || [
    {label:"Pillar",value:out.pillar},
    {label:"Audience",value:out.audience},
    {label:"Intent",value:out.intent},
    {label:"Source",value:out.source},
  ];
  return out;
}
function flattenContent(cols){
  return CONTENT_ORDER.flatMap(stage=>(((cols||{})[stage])||[]).map((item,index)=>inferContentItem(item,stage,index)));
}
const CONTENT_AGENT_ACTIONS = [

function contentActionPrompt(action,item){
  const brief = [
    `Content item: ${item.t}`,
    `Stage: ${item.stage}`,
    `Channel: ${item.p}`,
    `Strategic pillar: ${item.pillar}`,
    `Audience: ${item.audience}`,
    `Intent: ${item.intent}`,
    `Format: ${item.format}`,
    `Evidence status: ${item.evidence}`,
    `Priority score: ${item.score}/100`,
    `Current signal: ${item.signal}`,
    `Recommended next action: ${item.next_action}`,
  ].join("\n");
  const guardrail = "Use only the content metadata above. Do not invent metrics, source links, dates, client names, or facts. If a detail is missing, say it is not recorded. Return concise, ready-to-use output.";
  if(action.key === "brief") return `${brief}\n\n${guardrail}\nCreate a content brief with audience insight, central claim, angle, structure, CTA, and what must be true before drafting.`;
  if(action.key === "evidence") return `${brief}\n\n${guardrail}\nCreate an evidence plan. Identify claim risks, missing source types, search targets, and the minimum evidence needed before publication.`;
  if(action.key === "draft") return `${brief}\n\n${guardrail}\nDraft the content in the recommended format. Keep it sharp, useful, and appropriate for the channel.`;
  if(action.key === "voice") return `${brief}\n\n${guardrail}\nRewrite or shape the item in Aaron's thought-leadership voice: direct, analytical, and non-fluffy. Include a stronger hook and closing line.`;
  if(action.key === "review") return `${brief}\n\n${guardrail}\nRun a pre-publication QA review. Check claims, audience fit, format fit, tone, risk, and readiness. Give a publish/hold recommendation.`;
  if(action.key === "publish") return `${brief}\n\n${guardrail}\nCreate a publication record. Include publication checklist, suggested publish copy, final caveats, metadata to preserve, and the first follow-up signal to watch.`;
  return brief;
}
function localContentOutput(action,item){
  if(action.key === "brief") return `Brief\n- Audience: ${item.audience}\n- Pillar: ${item.pillar}\n- Central angle: ${item.next_action}\n- Format: ${item.format}\n- CTA: invite a concrete response from ${item.audience}.\n- Before drafting: resolve evidence status (${item.evidence}).`;

  return item.next_action;
}
function ContentDrawer({item,onClose,onChanged}){
  const [busy,setBusy]=useState("");
  const [outputs,setOutputs]=useState({});
  useEffect(()=>{setBusy("");setOutputs({});},[item?.id]);
  if(!item) return null;
  const runContentAgentAction=async(action)=>{
    setBusy(action.key);
    setOutputs(o=>({...o,[action.key]:"Running..."}));
    try{
      const prompt=contentActionPrompt(action,item);
      const resp=await fetch(`${API}/content/action`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        action:action.key,
        query:prompt,
        department:action.department,
        subagent:action.subagent,
        item,
        conversation_history:[]
      })});
      const d=await resp.json();
      if(!resp.ok || !d.ok) throw new Error(d.detail || d.error || "Agent service unavailable");
      if(!String(d.answer||"").trim()) throw new Error("Agent returned no generated output");
      if(!d.persisted) throw new Error("The action ran, but the vault write was not confirmed");
      const suffix=d.path ? `\n\nSaved to Obsidian: ${d.path}` : "";
      setOutputs(o=>({...o,[action.key]:{status:"done", text:d.answer + suffix, path:d.path || ""}}));
      if(onChanged) onChanged(d);
    }catch(e){
      setOutputs(o=>({...o,[action.key]:{status:"error", text:`Could not run the agent action.\n\n${e.message || e}\n\nNo local placeholder was used. Start the orchestrator on ${API} and try again.`}}));
    }finally{
      setBusy("");
    }
  };
  const runAssistedAction=async(action)=>{
    const key=`assist-${action.key}`;
    setBusy(key);
    setOutputs(o=>({...o,[key]:"Running..."}));
    try{
      const resp=await fetch(`${API}/content/assist`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        action:action.key,
        label:action.label,
        detail:action.detail,
        item,
      })});
      const d=await resp.json();
      if(!resp.ok || !d.ok) throw new Error(d.detail || d.error || "Assisted action unavailable");
      if(!String(d.answer||"").trim()) throw new Error("Agent returned no improvement plan");
      if(!d.persisted) throw new Error("The improvement plan was not confirmed in the vault");
      const suffix=d.path ? `\n\nSaved to Obsidian: ${d.path}` : "";
      setOutputs(o=>({...o,[key]:{status:"done", text:d.answer + suffix, path:d.path || ""}}));
      if(onChanged) onChanged(d);
    }catch(e){
      setOutputs(o=>({...o,[key]:{status:"error", text:`Could not run assisted action.\n\n${e.message || e}\n\nNo local placeholder was used.`}}));
    }finally{
      setBusy("");
    }
  };
  return (
    <div className="delivery-drawer-bg" onClick={onClose}>
      <aside className="delivery-drawer" onClick={e=>e.stopPropagation()} aria-label="Content intelligence detail">

              <span className={"stag "+item.st}>{item.signal}</span>
              <span className="tagx">{item.p}</span>
              <span className="tagx">{item.score}/100 priority</span>
            </div>
          </div>
          <button className="drawer-close" onClick={onClose} aria-label="Close content detail">×</button>
        </div>
        <div className="drawer-grid">
          <div className="drawer-tile"><div className="k">Audience</div><div className="v">{item.audience}</div></div>
          <div className="drawer-tile"><div className="k">Intent</div><div className="v">{item.intent}</div></div>
          <div className="drawer-tile"><div className="k">Format</div><div className="v">{item.format}</div></div>
          <div className="drawer-tile"><div className="k">Effort</div><div className="v">{item.effort}</div></div>
        </div>
        <div className="drawer-section">
          <div className="sec-h"><span className="t">Recommended next action</span><span className="x">content system</span></div>
          <div className="sticky">{item.next_action}</div>
