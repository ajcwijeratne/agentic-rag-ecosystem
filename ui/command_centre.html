function MediaLibraryView(){
  const [assets,setAssets]=useState([]);
  const [collections,setCollections]=useState([]);
  const [selected,setSelected]=useState(null);
  const [q,setQ]=useState("");
  const [type,setType]=useState("");
  const [status,setStatus]=useState("");
  const [rights,setRights]=useState("");
  const [newName,setNewName]=useState("");
  const [newProject,setNewProject]=useState("");
  const [toast,setToast]=useState("");
  const [momentAsset,setMomentAsset]=useState(null);
  const [moments,setMoments]=useState([]);

  const loadAssets=()=> {
    const p=new URLSearchParams();
    if(q) p.set('q',q); if(type) p.set('type',type); if(status) p.set('status',status); if(rights) p.set('rights',rights);
    fetch(`${API}/assets?${p}`).then(r=>r.ok?r.json():Promise.reject()).then(d=>setAssets(d.items||[])).catch(()=>setAssets([]));
  };
  const loadCollections=()=>fetch(`${API}/asset-collections`).then(r=>r.ok?r.json():Promise.reject()).then(d=>setCollections(d.items||[])).catch(()=>setCollections([]));
  const openCollection=id=>fetch(`${API}/asset-collections/${id}`).then(r=>r.ok?r.json():Promise.reject()).then(setSelected).catch(()=>setSelected(null));
  useEffect(()=>{loadAssets();loadCollections();},[]);

  const createCollection=async()=>{
    if(!newName.trim()){setToast("Name the pack first.");return;}
    try{
      const r=await fetch(`${API}/asset-collections`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:newName.trim(),project:newProject.trim()||null,purpose:'media pack'})});
      const d=await r.json();
      setSelected(d); setNewName(""); setNewProject(""); setToast("Pack created"); loadCollections();
    }catch{setToast("Could not create pack");}
  };
  const addAsset=async(asset,role='reference')=>{
    if(!selected){setToast("Select a pack first.");return;}
    try{
      const r=await fetch(`${API}/asset-collections/${selected.collection_id}/assets`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({asset_id:asset.asset_id,role})});
      setSelected(await r.json()); setToast("Asset added to pack"); loadCollections();
    }catch{setToast("Could not add asset");}
  };
  const removeAsset=async(assetId)=>{
    if(!selected) return;
    try{
      const r=await fetch(`${API}/asset-collections/${selected.collection_id}/assets/${assetId}`,{method:'DELETE'});
      setSelected(await r.json()); setToast("Asset removed");
    }catch{setToast("Could not remove asset");}
  };
  const archiveSelected=async()=>{
    if(!selected) return;
    try{
      const r=await fetch(`${API}/asset-collections/${selected.collection_id}`,{method:'DELETE'});
      setSelected(await r.json()); setToast("Pack archived"); loadCollections();
    }catch{setToast("Could not archive pack");}
  };
  const inspectAsset=async(asset)=>{
    setMomentAsset(asset);
    try{
      const r=await fetch(`${API}/assets/${asset.asset_id}/moments`);
      const d=await r.json();
      setMoments(d.items||[]);
    }catch{setMoments([]);}
  };
  const ready=selected?.readiness||{};

  return (
    <div className="view-wrap"><div className="view-inner" style={{maxWidth:1180}}>
      <ViewHead eyebrow="Media assets" title="Media library." lede="Search multimodal assets, curate them into project packs, and check readiness before production uses them."/>
      {toast&&<div className="card" style={{marginTop:18,background:'var(--pine-tint)',color:'var(--pine)',fontSize:13}}>{toast}</div>}
      <div className="grid-3" style={{marginTop:24}}>
        <div className="card stat"><div className="k">Assets</div><div className="v">{assets.length}</div><div className="s">Current filter</div></div>
        <div className="card stat"><div className="k">Packs</div><div className="v">{collections.length}</div><div className="s">Media collections</div></div>
        <div className="card stat"><div className="k">Selected pack</div><div className="v" style={{fontSize:24}}>{selected?selected.name:"None"}</div><div className="s">{selected?`${ready.ready||0}/${ready.total||0} ready`:"Create or select one"}</div></div>
      </div>

      <div className="grid-2" style={{marginTop:16,alignItems:'start'}}>
        <div className="card">
          <div className="sec-h"><span className="t">Collections</span><span className="x">{collections.length}</span></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 120px auto',gap:8,marginBottom:12}}>
            <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="New pack name" style={{background:'var(--surface-2)',border:'1px solid var(--line)',borderRadius:8,padding:'8px 9px',fontSize:12}}/>
            <input value={newProject} onChange={e=>setNewProject(e.target.value)} placeholder="Project" style={{background:'var(--surface-2)',border:'1px solid var(--line)',borderRadius:8,padding:'8px 9px',fontSize:12}}/>
            <button onClick={createCollection} style={{background:'var(--pine)',border:'none',color:'#fff',borderRadius:8,padding:'8px 11px',fontSize:12,fontWeight:600,cursor:'pointer'}}>Create</button>
          </div>
          {(collections||[]).map(c=>(
            <div key={c.collection_id} onClick={()=>openCollection(c.collection_id)} className="kv" style={{cursor:'pointer',alignItems:'center'}}>
              <span><span style={{fontWeight:600}}>{c.name}</span><span className="mini" style={{marginLeft:8}}>{c.project||'no project'}</span></span>
              <span className={"stag "+(c.status==='ready'?'st-good':c.status==='archived'?'st-mute':'st-warn')}>{c.status}</span>
            </div>
          ))}
        </div>

        <div className="card">
          <div className="sec-h"><span className="t">Pack readiness</span><span className="x">{selected?.status||'none'}</span></div>
          {!selected&&<div className="mini">Select a collection to inspect readiness.</div>}
          {selected&&<>
            <div style={{display:'flex',justifyContent:'space-between',gap:12,alignItems:'center'}}>
              <div>
                <div style={{fontSize:16,fontWeight:700,color:'var(--ink)'}}>{selected.name}</div>
                <div className="mini">{selected.project||'No project'} · {selected.purpose||'No purpose'}</div>
              </div>
              <span className={"stag "+(ready.is_ready?'st-good':'st-warn')}>{ready.is_ready?'ready':'not ready'}</span>
            </div>
            <div className="grid-3" style={{marginTop:14}}>
              <MiniStat label="Assets" value={ready.total||0}/>
              <MiniStat label="Rights OK" value={`${ready.rights_ok||0}/${ready.total||0}`}/>
              <MiniStat label="Indexed" value={`${ready.indexed||0}/${ready.total||0}`}/>
            </div>
            {(ready.risky_assets||[]).length>0&&<div className="sticky" style={{marginTop:12}}>Rights review needed for {(ready.risky_assets||[]).length} asset(s).</div>}
            <div style={{marginTop:12,display:'flex',gap:8}}>
              <button onClick={()=>fetch(`${API}/asset-collections/${selected.collection_id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:ready.is_ready?'ready':'draft'})}).then(r=>r.json()).then(d=>{setSelected(d);loadCollections();})} style={{background:'var(--pine)',border:'none',color:'#fff',borderRadius:8,padding:'7px 11px',fontSize:12,fontWeight:600,cursor:'pointer'}}>Sync status</button>
              <button onClick={archiveSelected} style={{background:'var(--surface-2)',border:'1px solid var(--line)',color:'var(--muted)',borderRadius:8,padding:'7px 11px',fontSize:12,cursor:'pointer'}}>Archive</button>
            </div>
          </>}
        </div>
      </div>

      {selected&&<div className="card" style={{marginTop:16,padding:'4px 20px'}}>
        <div className="sec-h" style={{margin:'12px 0'}}><span className="t">Assets in pack</span><span className="x">{(selected.assets||[]).length}</span></div>
        {(selected.assets||[]).length===0&&<div className="mini" style={{paddingBottom:14}}>No assets in this pack yet.</div>}
        {(selected.assets||[]).map(a=><MediaAssetRow key={a.asset_id} asset={a} actionLabel="Remove" onAction={()=>removeAsset(a.asset_id)} onInspect={()=>inspectAsset(a)}/>)}
      </div>}

      {momentAsset&&<div className="card" style={{marginTop:16}}>
        <div className="sec-h"><span className="t">Asset moments</span><span className="x">{moments.length}</span></div>
        <div style={{fontSize:15,fontWeight:700,color:'var(--ink)'}}>{momentAsset.path?.split(/[\\/]/).pop()||momentAsset.asset_id}</div>
        <div className="mini" style={{marginTop:3}}>{momentAsset.type} · {momentAsset.asset_id}</div>
        <div style={{marginTop:12,display:'flex',flexDirection:'column',gap:8,maxHeight:360,overflow:'auto'}}>
          {moments.length===0&&<div className="mini">No moments recorded for this asset yet.</div>}
          {moments.map(m=><div key={m.moment_id} className="kv" style={{alignItems:'start'}}>
            <span style={{minWidth:0}}>
              <span className="stag st-mute">{m.kind}</span>
              <span style={{marginLeft:8,fontWeight:600,color:'var(--ink)'}}>{m.label||'Moment'}</span>
              {(m.t_start!==null&&m.t_start!==undefined)&&<span className="mini" style={{marginLeft:8}}>{Number(m.t_start).toFixed(1)}s{m.t_end?`-${Number(m.t_end).toFixed(1)}s`:''}</span>}
              {m.text&&<div className="mini" style={{marginTop:4,lineHeight:1.45,whiteSpace:'normal'}}>{m.text.slice(0,260)}{m.text.length>260?'...':''}</div>}
              {m.thumbnail_path&&<div className="mini" style={{marginTop:4}}>{m.thumbnail_path}</div>}
            </span>
          </div>)}
        </div>
      </div>}

      <div className="card" style={{marginTop:16}}>
        <div className="sec-h"><span className="t">Asset browser</span><span className="x">{assets.length}</span></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 130px 130px 150px auto',gap:8,marginBottom:12}}>
          <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')loadAssets();}} placeholder="Search tags or transcript text" style={{background:'var(--surface-2)',border:'1px solid var(--line)',borderRadius:8,padding:'8px 9px',fontSize:12}}/>
          <select value={type} onChange={e=>setType(e.target.value)} style={{background:'var(--surface-2)',border:'1px solid var(--line)',borderRadius:8,padding:'8px 9px',fontSize:12}}><option value="">Any type</option>{['audio','video','image','slide_deck','web_page','document'].map(x=><option key={x} value={x}>{x}</option>)}</select>
          <select value={status} onChange={e=>setStatus(e.target.value)} style={{background:'var(--surface-2)',border:'1px solid var(--line)',borderRadius:8,padding:'8px 9px',fontSize:12}}><option value="">Any status</option>{['ingesting','ready','quarantined','failed','archived'].map(x=><option key={x} value={x}>{x}</option>)}</select>
          <select value={rights} onChange={e=>setRights(e.target.value)} style={{background:'var(--surface-2)',border:'1px solid var(--line)',borderRadius:8,padding:'8px 9px',fontSize:12}}><option value="">Any rights</option>{['owned','licensed','client_confidential','third_party','unknown'].map(x=><option key={x} value={x}>{x}</option>)}</select>
          <button onClick={loadAssets} style={{background:'var(--pine)',border:'none',color:'#fff',borderRadius:8,padding:'8px 12px',fontSize:12,fontWeight:600,cursor:'pointer'}}>Search</button>
        </div>
        {(assets||[]).map(a=><MediaAssetRow key={a.asset_id} asset={a} actionLabel={selected?'Add':'Select pack'} onAction={()=>addAsset(a)} onInspect={()=>inspectAsset(a)}/>)}
        {assets.length===0&&<div className="mini">No assets match this filter.</div>}
      </div>
    </div></div>
  );
}

function MediaAssetRow({asset,actionLabel,onAction,onInspect}){
  const risky=['unknown','third_party','client_confidential'].includes(asset.rights);
  return <div className="kv" style={{alignItems:'center'}}>
    <span style={{minWidth:0}}>
      <span style={{fontWeight:600,color:'var(--ink)'}}>{asset.path?.split(/[\\/]/).pop()||asset.asset_id}</span>
      <span className="mini" style={{marginLeft:8}}>{asset.type} · {asset.project||'no project'}</span>
      <div className="mini" style={{marginTop:2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{asset.asset_id}</div>
    </span>
    <span style={{display:'flex',gap:8,alignItems:'center'}}>
      <span className={"stag "+(asset.status==='ready'?'st-good':asset.status==='failed'?'st-fail':'st-mute')}>{asset.status}</span>
      <span className={"stag "+(risky?'st-warn':'st-good')}>{asset.rights}</span>

      <button onClick={onAction} style={{background:'var(--surface-2)',border:'1px solid var(--line)',color:'var(--pine)',borderRadius:8,padding:'6px 10px',fontSize:12,fontWeight:600,cursor:'pointer'}}>{actionLabel}</button>
    </span>
  </div>;
}

// Knowledge base
const SEED_KB = {demo:true, stats:{docs:5,chunks:1180,updated:"Demo data"}, collections:[], sources:[
  {name:"WijerCo capability briefs", chunks:210, fresh:"Current", st:"st-good"},
  {name:"TEQSA & AQF reference set", chunks:340, fresh:"Current", st:"st-good"},
  {name:"QILT / HEIMS extracts", chunks:180, fresh:"Stale · 90 days", st:"st-warn"},
  {name:"Client institutional data", chunks:260, fresh:"Current", st:"st-good"},
  {name:"Sector literature", chunks:190, fresh:"Gap · no 2026 sources", st:"st-warn"},
]};
const KB_REINDEX_TARGET = {obsidian_vault:'vault', wijerco_knowledge:'wijerco'};
function KnowledgeBaseView(){
  const [d,setD]=useState(null);
  const [q,setQ]=useState(null);
  const [misses,setMisses]=useState([]);
  const [open,setOpen]=useState(null);
  const [files,setFiles]=useState({});
  const [attn,setAttn]=useState(false);
  const [busy,setBusy]=useState('');
  const [err,setErr]=useState('');
  const load=()=>{
    fetch(`${API}/kb/overview`).then(r=>r.ok?r.json():Promise.reject()).then(setD).catch(()=>setD(SEED_KB));
    fetch(`${API}/kb/quality`).then(r=>r.ok?r.json():null).then(x=>x&&setQ(x)).catch(()=>{});
    fetch(`${API}/kb/misses`).then(r=>r.ok?r.json():null).then(x=>x&&setMisses(x.items||[])).catch(()=>{});
  };
  useEffect(load,[]);
  const s=(d||{}).stats||{}; const cols=(d||{}).collections||[];
  const demo=!!(d||{}).demo;
  const allSources=(d||{}).sources||[];
  const sources=allSources.filter(x=>!attn||x.st==='st-warn'||x.st==='st-fail');
  const srcKey=(x)=>(x.collection||'')+'/'+x.name;
  const toggle=(x)=>{
    const key=srcKey(x);
    if(open===key){setOpen(null);return;}
    setOpen(key);
    if(!files[key]&&!demo){
      fetch(`${API}/kb/source/${encodeURIComponent(x.name)}?collection=${encodeURIComponent(x.collection||'')}`)
        .then(r=>r.ok?r.json():null)
        .then(res=>res&&setFiles(prev=>({...prev,[key]:res.files||[]})))
        .catch(()=>{});
    }
  };
  const reindex=(e,target)=>{
    e.stopPropagation();
    if(busy)return;
    setBusy(target);setErr('');
    fetch(`${API}/kb/reindex`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({target})})
      .then(r=>r.ok?r.json():r.json().then(x=>Promise.reject(x.detail||'Re-index failed')))
      .then(()=>{setBusy('');setFiles({});load();})
      .catch(x=>{setBusy('');setErr(String(x));});
  };
  const runQuality=()=>{
    if(busy)return;
    setBusy('quality');setErr('');
    fetch(`${API}/kb/quality/run`,{method:'POST'})
      .then(r=>r.ok?r.json():r.json().then(x=>Promise.reject(x.detail||'Quality run failed')))
      .then(x=>{setQ(x);setBusy('');})
      .catch(x=>{setBusy('');setErr(String(x));});
  };
  const recall=q&&q.recall_at_5!=null?Math.round(q.recall_at_5*100)+'%':'—';
  return (
    <div className="view-wrap"><div className="view-inner">
      <ViewHead eyebrow="Retrieval corpus" title="Knowledge base." lede="What the agents draw on. Every number here is measured from the live index, not typed in."/>
      {demo && <div className="card" style={{marginTop:18,padding:'12px 18px',borderLeft:'3px solid #a23b2f'}}>
        <span className="stag st-fail">Demo data</span>
        <span className="mini" style={{marginLeft:10}}>Qdrant is unreachable. Nothing below reflects the live corpus.</span>
      </div>}
      {err && <div className="card" style={{marginTop:18,padding:'12px 18px'}}><span className="stag st-fail">Error</span><span className="mini" style={{marginLeft:10}}>{err}</span></div>}
      <div className="grid-4" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginTop:24}}>
        <div className="card stat"><div className="k">Documents</div><div className="v">{s.docs!=null?s.docs:"—"}</div><div className="s">Distinct files in the index</div></div>
        <div className="card stat"><div className="k">Chunks</div><div className="v">{s.chunks!=null?s.chunks:"—"}</div><div className="s">Across all collections</div></div>
        <div className="card stat"><div className="k">Last indexed</div><div className="v" style={{fontSize:19}}>{s.updated||"—"}</div><div className="s">Most recent index run</div></div>
        <div className="card stat"><div className="k">Recall@5</div><div className="v">{recall}</div><div className="s">{q&&q.ts_label?`Checked ${q.ts_label}`:"Never run"}</div></div>
      </div>
      {cols.length>0 && <React.Fragment>
        <div className="row-head"><h3>Collections</h3><span className="mini">{cols.length} in Qdrant</span></div>
        <div className="card" style={{padding:'4px 20px'}}>
          {cols.map((c,i)=>(
            <div key={i} className="kv" style={{alignItems:'center'}}>
              <span style={{color:'var(--ink)',fontWeight:500}}>{c.label}<span className="mini" style={{marginLeft:8}}>{c.collection}</span></span>
              <span style={{display:'flex',gap:14,alignItems:'center'}}>
                <span className="mini">{c.docs} docs · {c.chunks} chunks</span>
                <span className="mini">{c.last_indexed_label}</span>
                {KB_REINDEX_TARGET[c.collection] && (
                  <button className="icon-btn" style={{width:'auto',padding:'3px 12px',fontSize:12}}
                    disabled={busy===KB_REINDEX_TARGET[c.collection]}
                    onClick={(e)=>reindex(e,KB_REINDEX_TARGET[c.collection])}>
                    {busy===KB_REINDEX_TARGET[c.collection]?'Indexing…':'Index now'}
                  </button>
                )}
              </span>
            </div>
          ))}
        </div>
      </React.Fragment>}
      <div className="row-head"><h3>Sources</h3>
        <span style={{display:'flex',gap:10,alignItems:'center'}}>
          <button className="icon-btn" style={{width:'auto',padding:'3px 12px',fontSize:12}} onClick={()=>setAttn(v=>!v)}>
            {attn?'Show all':'Needs attention'}
          </button>
          <span className="mini">{sources.length} of {allSources.length}</span>
        </span>
      </div>
      <div className="card" style={{padding:'4px 20px'}}>
        {sources.length===0 && <div className="kv"><span className="mini">Nothing needs attention.</span><span/></div>}
        {sources.map((x,i)=>(
          <React.Fragment key={i}>
            <div className="kv" style={{alignItems:'center',cursor:demo?'default':'pointer'}} onClick={()=>!demo&&toggle(x)}>
              <span style={{color:'var(--ink)',fontWeight:500}}>{x.name}{x.collection_label&&<span className="mini" style={{marginLeft:8}}>{x.collection_label}</span>}</span>
              <span style={{display:'flex',gap:14,alignItems:'center'}}>
                {x.docs!=null&&<span className="mini">{x.docs} docs</span>}
                <span className="mini">{x.chunks} chunks</span>
                <span className={"stag "+x.st}>{x.fresh}</span>
              </span>
            </div>
            {open===srcKey(x) && (
              <div style={{padding:'2px 0 12px 14px'}}>
                {!files[srcKey(x)] && <div className="mini">Loading files…</div>}
                {(files[srcKey(x)]||[]).map((f,j)=>(
                  <div key={j} className="kv" style={{alignItems:'center',borderBottom:'none',padding:'5px 0'}}>
                    <span className="mini" style={{color:'var(--ink)'}}>{f.file}</span>
                    <span style={{display:'flex',gap:12,alignItems:'center'}}>
                      <span className="mini">{f.chunks} chunks</span>
                      <span className="mini">{f.modified_label}</span>
                      <span className={"stag "+f.st}>{f.fresh}</span>
                    </span>
                  </div>
                ))}
              </div>
            )}
          </React.Fragment>
        ))}
      </div>
      <div className="row-head"><h3>Retrieval quality</h3>
        <button className="icon-btn" style={{width:'auto',padding:'3px 12px',fontSize:12}} disabled={busy==='quality'} onClick={runQuality}>
          {busy==='quality'?'Running…':'Run quality check'}
        </button>
      </div>
      <div className="card" style={{padding:'4px 20px'}}>
        {(!q||!q.cases||q.cases.length===0) && <div className="kv"><span className="mini">No quality run recorded. Run one to measure recall against the live index.</span><span/></div>}
        {(q&&q.cases||[]).map((c,i)=>(
          <div key={i} className="kv" style={{alignItems:'center'}}>
            <span className="mini" style={{color:'var(--ink)'}}>{c.query}</span>
            <span style={{display:'flex',gap:12,alignItems:'center'}}>
              <span className="mini">{(c.expected||[]).join(', ')}</span>
              <span className={"stag "+(c.pass?'st-good':'st-fail')}>{c.pass?'found':'missed'}</span>
            </span>
          </div>
        ))}
      </div>
      <div className="row-head"><h3>Unanswered queries</h3><span className="mini">{misses.length} recent</span></div>
      <div className="card" style={{padding:'4px 20px'}}>
        {misses.length===0 && <div className="kv"><span className="mini">No misses logged. Queries that retrieve nothing useful will appear here.</span><span/></div>}
        {misses.map((m,i)=>(
          <div key={i} className="kv" style={{alignItems:'center'}}>
            <span className="mini" style={{color:'var(--ink)'}}>{m.query}</span>
            <span style={{display:'flex',gap:12,alignItems:'center'}}>
              <span className="mini">{m.collection}</span>
              <span className="mini">top score {m.dense_top}</span>
              <span className="mini">{m.ts_label||''}</span>
            </span>
          </div>
        ))}
      </div>
    </div></div>
  );
}

  {g:"Identity", items:["Aaron Wijeratne, Academic Director at OES, Swinburne Online","Positioning for PVC or Academic Dean on a 12-month horizon","PhD Organisational Behaviour; Business and Commerce (Hons)"]},
  {g:"Preferences", items:["Lead with the point; no preamble or filler","Banned buzzwords enforced; no em dashes","Claims backed by names, numbers, and dates"]},

];
function MemoryView(){
  const [groups,setGroups]=useState(null);
  useEffect(()=>{fetch(`${API}/memory/overview`).then(r=>r.ok?r.json():Promise.reject()).then(d=>setGroups(d.groups||d)).catch(()=>setGroups(SEED_MEMORY));},[]);
  return (

      <div className="grid-2" style={{marginTop:24}}>

              {(g.items||[]).map((it,j)=>(
                <div key={j} style={{display:'flex',gap:10,fontSize:13.5,color:'var(--ink)',lineHeight:1.5}}>
                  <span style={{width:6,height:6,borderRadius:'50%',background:'var(--gold)',flex:'none',marginTop:6}}/>
                  <span>{it}</span>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div></div>
  );
}

// Quality cockpit
const SEED_QUALITY = {
  traces:{total:0,avg_latency_ms:0,avg_cost_usd:0,avg_confidence:0,citation_rate:0,error_rate:0,providers:[],agents:[],top_errors:[]},
  latest_eval:null,
  eval_runs:[],
  recommendations:["Run the offline routing eval to establish a quality baseline."],
};
const pct = v => `${Math.round((Number(v)||0)*100)}%`;
function QualityCockpit(){
  const [data,setData]=useState(null);
  const [queue,setQueue]=useState([]);
  const [running,setRunning]=useState(false);
  const [selectedRun,setSelectedRun]=useState(null);
  const [caseFilter,setCaseFilter]=useState('failed');
  const [savingCase,setSavingCase]=useState("");
  const [err,setErr]=useState("");
  const [toast,setToast]=useState("");
  const load=()=>fetch(`${API}/quality/overview`).then(r=>r.ok?r.json():Promise.reject()).then(d=>{setData(d);setErr("");}).catch(()=>{setData(SEED_QUALITY);setErr("Quality service unavailable; showing seed state.");});
  const loadQueue=()=>fetch(`${API}/evals/work-queue`).then(r=>r.ok?r.json():Promise.reject()).then(d=>setQueue(d.items||[])).catch(()=>setQueue([]));
  useEffect(()=>{load();loadQueue();},[]);

  const runBaseline=async()=>{
    setRunning(true); setErr("");
    try{
      const r=await fetch(`${API}/evals/run`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({suite:'routing',live:false})});
      if(!r.ok) throw new Error("Eval run failed");
      await load();
      await loadQueue();
    }catch(e){ setErr(e.message||"Eval run failed"); }
    finally{ setRunning(false); }
  };

  const openRun=async(id)=>{
    setErr("");
    try{
      const r=await fetch(`${API}/evals/runs/${id}`);
      if(!r.ok) throw new Error("Could not load eval run");
      setSelectedRun(await r.json());
    }catch(e){ setErr(e.message||"Could not load eval run"); }
  };

  const createTask=async(text)=>{
    setToast("");
    try{
      const r=await fetch(`${API}/productivity/capture`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'task',text})});
      const j=await r.json();
      setToast(j.ok?`Task added to ${j.file}`:(j.error||'Could not create task'));
    }catch{ setToast("Could not create task"); }
  };

  const updateCaseState=async(c, patch)=>{
    const key=`${c.suite}:${c.case_id}`;
    setSavingCase(key); setToast("");
    try{
      const r=await fetch(`${API}/evals/cases/${encodeURIComponent(c.suite)}/${encodeURIComponent(c.case_id)}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(patch)});
      if(!r.ok) throw new Error("Could not update case");
      const updated=await r.json();
      setSelectedRun(run=>run?{...run,results:(run.results||[]).map(x=>x.suite===c.suite&&x.case_id===c.case_id?{...x,case_status:updated.status,case_note:updated.note,case_updated_at:updated.updated_at}:x)}:run);
      setQueue(q=>q.map(x=>x.suite===c.suite&&x.case_id===c.case_id?{...x,status:updated.status,note:updated.note,updated_at:updated.updated_at,case_status:updated.status,case_note:updated.note,case_updated_at:updated.updated_at}:x).filter(x=>x.status!=='verified'));
      setToast(`Case ${c.case_id} marked ${updated.status}`);
    }catch(e){ setErr(e.message||"Could not update case"); }
    finally{ setSavingCase(""); }
  };

  const verifyCase=async(c)=>{
    const key=`${c.suite}:${c.case_id}`;
    setSavingCase(key); setToast("");
    try{
      const r=await fetch(`${API}/evals/cases/${encodeURIComponent(c.suite)}/${encodeURIComponent(c.case_id)}/verify`,{method:'POST'});
      if(!r.ok) throw new Error("Verification failed");
      const d=await r.json();
      const state=d.case_state||{};
      setSelectedRun(run=>run?{...run,results:(run.results||[]).map(x=>x.suite===c.suite&&x.case_id===c.case_id?{...x,case_status:state.status,case_note:state.note,case_updated_at:state.updated_at}:x)}:run);
      setQueue(q=>q.map(x=>x.suite===c.suite&&x.case_id===c.case_id?{...x,status:state.status,note:state.note,updated_at:state.updated_at,case_status:state.status,case_note:state.note}:x).filter(x=>x.status!=='verified'));
      setToast(d.passed?`Case ${c.case_id} verified`:`Case ${c.case_id} still failing`);
      await load();
    }catch(e){ setErr(e.message||"Verification failed"); }
    finally{ setSavingCase(""); }
  };

  const t=(data||SEED_QUALITY).traces||SEED_QUALITY.traces;
  const latest=(data||SEED_QUALITY).latest_eval;
  const summary=latest?.summary||{};
  const runs=(data||SEED_QUALITY).eval_runs||[];
  const recs=(data||SEED_QUALITY).recommendations||[];
  const health=[
    {k:"Eval pass",v:latest?pct(summary.pass_rate):"Not run",s:latest?`${summary.passed||0}/${summary.total||0} cases`:"Baseline needed",st:latest?(summary.pass_rate>=.85?"st-good":"st-warn"):"st-mute"},
    {k:"Citations",v:pct(t.citation_rate),s:`${t.total||0} traced requests`,st:t.citation_rate>=.7?"st-good":(t.total? "st-warn":"st-mute")},
    {k:"Errors",v:pct(t.error_rate),s:"recent trace rate",st:t.error_rate>.05?"st-fail":"st-good"},
    {k:"Confidence",v:pct(t.avg_confidence),s:`avg ${fmtMs(Math.round(t.avg_latency_ms||0))}`,st:t.avg_confidence>=.65?"st-good":(t.total?"st-warn":"st-mute")},
  ];

  return (
    <div className="view-wrap"><div className="view-inner">
      <div style={{display:'flex',gap:18,alignItems:'flex-start',justifyContent:'space-between'}}>
        <ViewHead eyebrow="Quality" title="Quality cockpit." lede="The live read on routing accuracy, citation discipline, errors, confidence, latency, and what needs attention next."/>
        <button onClick={runBaseline} disabled={running} style={{marginTop:6,background:running?'var(--bg3)':'var(--pine)',border:'none',color:'#fff',borderRadius:10,padding:'9px 15px',fontSize:13,fontWeight:600,cursor:running?'default':'pointer',whiteSpace:'nowrap'}}>
          {running?'Running baseline...':'Run routing baseline'}
        </button>
      </div>
      {err&&<div className="card" style={{marginTop:18,borderColor:'#e8b9b3',background:'#f8e9e7',color:'#8c3328',fontSize:13}}>{err}</div>}
      {toast&&<div className="card" style={{marginTop:18,borderColor:'var(--line)',background:'var(--pine-tint)',color:'var(--pine)',fontSize:13}}>{toast}</div>}
      <div className="grid-4" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginTop:24}}>
        {health.map(x=>(
          <div key={x.k} className="card stat">
            <div className="k">{x.k}</div>
            <div className="v" style={{fontSize:28}}>{x.v}</div>
            <div className="s" style={{display:'flex',justifyContent:'space-between',gap:8,alignItems:'center'}}>
              <span>{x.s}</span><span className={"stag "+x.st}>{x.st==='st-good'?'OK':x.st==='st-fail'?'Watch':'Review'}</span>
            </div>
          </div>
        ))}
      </div>

      <QualityWorkQueue
        items={queue}
        savingCase={savingCase}
        onUpdate={updateCaseState}
        onVerify={verifyCase}
        onTask={createTask}
        onOpenRun={openRun}
      />

      <div className="grid-2" style={{marginTop:16,alignItems:'start'}}>
        <div className="card">
          <div className="sec-h"><span className="t">Latest eval</span><span className="x">{latest?latest.mode:"none"}</span></div>
          {!latest&&<div className="mini">No eval run recorded yet.</div>}
          {latest&&<>
            <div style={{display:'flex',justifyContent:'space-between',gap:12,alignItems:'center'}}>
              <div>
                <div style={{fontSize:15,fontWeight:600,color:'var(--ink)'}}>{latest.suite}</div>
                <div className="mini" style={{marginTop:4}}>{fmtDate(latest.started_at)} · {latest.status}</div>
              </div>
              <div className="serif" style={{fontSize:32,color:'var(--pine)'}}>{pct(summary.pass_rate)}</div>
            </div>
            <div className="bar" style={{marginTop:14}}><i style={{width:pct(summary.pass_rate)}}/></div>
            <div className="grid-3" style={{marginTop:14}}>
              <MiniStat label="Score" value={(summary.avg_score||0).toFixed(2)}/>
              <MiniStat label="Cost" value={fmtCost(summary.cost_usd||0)}/>
              <MiniStat label="Latency" value={fmtMs(Math.round(summary.avg_latency_ms||0))}/>
            </div>
          </>}
        </div>

        <div className="card">
          <div className="sec-h"><span className="t">Recommendations</span><span className="x">{recs.length}</span></div>
          {recs.length===0&&<div className="mini">No recommendations right now.</div>}
          {recs.map((r,i)=><div key={i} className="sticky" style={{marginBottom:9}}>
            <div>{r}</div>
            <button onClick={()=>createTask(`Quality: ${r} #Product !high`)} style={{marginTop:10,background:'var(--surface)',border:'1px solid var(--gold-soft)',color:'#8a630f',borderRadius:7,padding:'5px 9px',fontSize:11,fontWeight:600,cursor:'pointer'}}>Create task</button>
          </div>)}
        </div>

        <div className="card">
          <div className="sec-h"><span className="t">Trace mix</span><span className="x">{t.total||0} requests</span></div>
          <TraceBars title="Providers" rows={t.providers||[]}/>
          <TraceBars title="Agents" rows={t.agents||[]}/>
        </div>

        <div className="card">
          <div className="sec-h"><span className="t">Top issues</span><span className="x">evals + traces</span></div>
          {(summary.top_issues||[]).slice(0,5).map((x,i)=>(
            <div key={i} className="kv"><span>{x.issue}</span><span className="mini">{x.count}</span></div>
          ))}
          {(summary.top_issues||[]).length===0&&(t.top_errors||[]).length===0&&<div className="mini">No issues recorded.</div>}
          {(t.top_errors||[]).slice(0,5).map((x,i)=>(
            <div key={`e${i}`} className="kv"><span style={{color:'var(--red)'}}>{x.error}</span><span className="mini">{x.count}</span></div>
          ))}
        </div>
      </div>

      <div className="card" style={{marginTop:16,padding:'4px 20px'}}>
        <div className="sec-h" style={{margin:'12px 0'}}><span className="t">Recent eval runs</span><span className="x">{runs.length}</span></div>
        {runs.length===0&&<div className="mini" style={{paddingBottom:14}}>Run the baseline to populate this history.</div>}
        {runs.slice(0,8).map(r=>(
          <div key={r.id} className="kv" onClick={()=>openRun(r.id)} style={{alignItems:'center',cursor:'pointer'}}>
            <span><span style={{fontWeight:600}}>{r.suite}</span><span className="mini" style={{marginLeft:10}}>{fmtDate(r.started_at)} · {r.mode}</span></span>
            <span style={{display:'flex',gap:10,alignItems:'center'}}>
              <span className={"stag "+((r.summary?.pass_rate||0)>=.85?'st-good':'st-warn')}>{pct(r.summary?.pass_rate||0)}</span>
              <span className="mini">{r.summary?.total||0} cases</span>
            </span>
          </div>
        ))}
      </div>

      {selectedRun&&(
        <div className="card" style={{marginTop:16}}>
          <div className="sec-h">
            <span className="t">Eval case detail</span>
            <span style={{display:'flex',gap:8,alignItems:'center'}}>
              {['failed','all','passed'].map(v=><button key={v} onClick={()=>setCaseFilter(v)} style={{background:caseFilter===v?'var(--pine)':'var(--surface-2)',border:'1px solid var(--line)',color:caseFilter===v?'#fff':'var(--muted)',borderRadius:7,padding:'4px 9px',fontSize:11,fontWeight:600,cursor:'pointer'}}>{v}</button>)}
              <button onClick={()=>setSelectedRun(null)} className="icon-btn" title="Close">×</button>
            </span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',gap:12,alignItems:'center',marginBottom:12}}>
            <div>
              <div style={{fontSize:16,fontWeight:700,color:'var(--ink)'}}>{selectedRun.suite}</div>
              <div className="mini">{fmtDate(selectedRun.started_at)} · {selectedRun.mode} · {selectedRun.status}</div>
            </div>
            <span className={"stag "+((selectedRun.summary?.pass_rate||0)>=.85?'st-good':'st-warn')}>{pct(selectedRun.summary?.pass_rate||0)} pass</span>
          </div>
          {(selectedRun.results||[])
            .filter(c=>caseFilter==='all'||(caseFilter==='failed'?!c.passed:c.passed))
            .map(c=>(
              <div key={c.case_id} style={{borderTop:'1px solid var(--line-soft)',padding:'12px 0'}}>
                <div style={{display:'flex',justifyContent:'space-between',gap:12,alignItems:'flex-start'}}>
                  <div style={{minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:700,color:'var(--ink)'}}>{c.case_id} <span className="mini" style={{fontWeight:400}}>· {c.target||'untargeted'}</span></div>
                    {c.detail?.prompt&&<div style={{fontSize:13,color:'var(--muted)',marginTop:5,lineHeight:1.45}}>{c.detail.prompt}</div>}
                    {c.issues?.length>0&&<div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:8}}>{c.issues.slice(0,4).map((x,i)=><span key={i} className="stag st-warn">{x}</span>)}</div>}
                  </div>
                  <div style={{display:'flex',gap:8,alignItems:'center',flex:'none'}}>
                    <span className={"stag "+(c.passed?'st-good':'st-fail')}>{c.passed?'passed':'failed'}</span>
                    <span className="tagx">{Math.round((c.score||0)*100)}%</span>
                    {!c.passed&&<button onClick={()=>createTask(`Quality eval failure ${c.case_id}: ${(c.issues||[])[0]||'review failed case'} #Product !high`)} style={{background:'var(--pine)',border:'none',color:'#fff',borderRadius:7,padding:'5px 9px',fontSize:11,fontWeight:600,cursor:'pointer'}}>Task</button>}
                  </div>
                </div>
                {c.detail?.reason&&<div className="mini" style={{marginTop:7}}>Reason: {c.detail.reason}</div>}
                <div style={{display:'grid',gridTemplateColumns:'150px 1fr auto',gap:8,alignItems:'center',marginTop:10}}>
                  <select value={c.case_status||'new'} disabled={savingCase===`${c.suite}:${c.case_id}`} onChange={e=>updateCaseState(c,{status:e.target.value})} style={{background:'var(--surface-2)',border:'1px solid var(--line)',borderRadius:7,padding:'6px 8px',fontSize:12,color:'var(--ink)'}}>
                    {['new','triaged','fixed','verified'].map(s=><option key={s} value={s}>{s}</option>)}
                  </select>
                  <input defaultValue={c.case_note||''} placeholder="Add a short triage note" onBlur={e=>{if(e.target.value!==(c.case_note||'')) updateCaseState(c,{note:e.target.value});}} style={{background:'var(--surface-2)',border:'1px solid var(--line)',borderRadius:7,padding:'6px 9px',fontSize:12,color:'var(--ink)',width:'100%'}}/>
                  <button onClick={()=>verifyCase(c)} disabled={savingCase===`${c.suite}:${c.case_id}`} style={{background:'var(--surface)',border:'1px solid var(--line)',color:'var(--pine)',borderRadius:7,padding:'6px 9px',fontSize:11,fontWeight:600,cursor:'pointer'}}>Verify</button>
                </div>
              </div>
            ))}
          {(selectedRun.results||[]).filter(c=>caseFilter==='all'||(caseFilter==='failed'?!c.passed:c.passed)).length===0&&<div className="mini">No cases match this filter.</div>}
        </div>
      )}
    </div></div>
  );
}

function MiniStat({label,value}){
  return <div style={{background:'var(--surface-2)',border:'1px solid var(--line-soft)',borderRadius:8,padding:10}}><div className="mini">{label}</div><div style={{fontSize:15,fontWeight:700,color:'var(--pine)',marginTop:4}}>{value}</div></div>;
}
function QualityWorkQueue({items,savingCase,onUpdate,onVerify,onTask,onOpenRun}){
  const statuses=['new','triaged','fixed','verified'];
  const openItems=(items||[]).filter(x=>x.status!=='verified');
  const grouped=statuses.reduce((acc,s)=>({...acc,[s]:(items||[]).filter(x=>x.status===s)}),{});
  return (
    <div className="card" style={{marginTop:16}}>
      <div className="sec-h">
        <span className="t">Quality work queue</span>
        <span className="x">{openItems.length} open</span>
      </div>
      {openItems.length===0&&<div className="mini">No open eval issues. Fresh failures will appear here after the next eval run.</div>}
      <div className="kan" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
        {statuses.map(s=>(
          <div key={s} className="kan-col">
            <div className="kan-h"><span>{s}</span><span>{grouped[s].length}</span></div>
            {grouped[s].slice(0,8).map(c=>(
              <div key={`${c.suite}:${c.case_id}`} className="kan-card">
                <div style={{display:'flex',justifyContent:'space-between',gap:8,alignItems:'center'}}>
                  <span style={{fontSize:13,fontWeight:700,color:'var(--ink)'}}>{c.case_id}</span>
                  <span className="tagx">{Math.round((c.score||0)*100)}%</span>
                </div>
                <div className="mini" style={{marginTop:4}}>{c.suite} · {c.target||'untargeted'}</div>
                {(c.issues||[])[0]&&<div style={{fontSize:12,color:'var(--muted)',marginTop:7,lineHeight:1.35}}>{(c.issues||[])[0]}</div>}
                {c.note&&<div className="sticky" style={{marginTop:8,padding:8,fontSize:12}}>{c.note}</div>}
                <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:6,marginTop:9}}>
                  <select value={c.status||'new'} disabled={savingCase===`${c.suite}:${c.case_id}`} onChange={e=>onUpdate(c,{status:e.target.value})} style={{background:'var(--surface-2)',border:'1px solid var(--line)',borderRadius:7,padding:'5px 6px',fontSize:11,color:'var(--ink)',minWidth:0}}>
                    {statuses.map(x=><option key={x} value={x}>{x}</option>)}
                  </select>
                  <button onClick={()=>onTask(`Quality eval ${c.case_id}: ${(c.issues||[])[0]||'review case'} #Product !high`)} style={{background:'var(--surface)',border:'1px solid var(--line)',color:'var(--pine)',borderRadius:7,padding:'5px 7px',fontSize:11,fontWeight:600,cursor:'pointer'}}>Task</button>
                </div>
                {c.status==='fixed'&&<button onClick={()=>onVerify(c)} disabled={savingCase===`${c.suite}:${c.case_id}`} style={{background:'var(--pine)',border:'none',color:'#fff',borderRadius:7,padding:'5px 7px',fontSize:11,fontWeight:600,cursor:'pointer',marginTop:7,width:'100%'}}>Re-run verification</button>}
                <input defaultValue={c.note||''} placeholder="Note" onBlur={e=>{if(e.target.value!==(c.note||'')) onUpdate(c,{note:e.target.value});}} style={{background:'var(--surface-2)',border:'1px solid var(--line)',borderRadius:7,padding:'5px 7px',fontSize:11,color:'var(--ink)',width:'100%',marginTop:7}}/>
                <button onClick={()=>onOpenRun(c.latest_run_id)} style={{background:'none',border:'none',color:'var(--muted)',fontSize:11,cursor:'pointer',padding:'7px 0 0'}}>Open run</button>
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

function Spark({data,color}){
  if(!data||data.length<2) return null;
  const w=88,h=24,min=Math.min(...data),max=Math.max(...data),rng=(max-min)||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-min)/rng)*(h-4)-2}`).join(' ');
  return <svg width={w} height={h} style={{display:'block',marginTop:8}}><polyline points={pts} fill="none" stroke={color} strokeWidth="1.6" strokeLinejoin="round" strokeLinecap="round"/></svg>;
}

// ── Deep-work timer (client-side pomodoro) ──────────────────────────────────
function DeepWork(){
  const TOTAL=25*60;
  const [left,setLeft]=useState(TOTAL);
  const [run,setRun]=useState(false);
  const [done,setDone]=useState(1);
  const ref=useRef(null);
  useEffect(()=>{
    if(run){ ref.current=setInterval(()=>setLeft(s=>{ if(s<=1){clearInterval(ref.current);setRun(false);setDone(d=>Math.min(4,d+1));return TOTAL;} return s-1; }),1000); }
    return ()=>clearInterval(ref.current);
  },[run]);
  const m=String(Math.floor(left/60)).padStart(2,'0'), s=String(left%60).padStart(2,'0');
  const R=42,C=2*Math.PI*R,pct=1-left/TOTAL;
  return (
    <div className="card" style={{background:'var(--pine-deep)',border:'1px solid var(--pine)',display:'flex',alignItems:'center',gap:18}}>
      <div style={{position:'relative',width:104,height:104,flex:'none'}}>
        <svg width="104" height="104" style={{transform:'rotate(-90deg)'}}>
          <circle cx="52" cy="52" r={R} fill="none" stroke="rgba(255,255,255,.12)" strokeWidth="6"/>
          <circle cx="52" cy="52" r={R} fill="none" stroke="var(--gold-soft)" strokeWidth="6" strokeLinecap="round" strokeDasharray={C} strokeDashoffset={C*(1-pct)} style={{transition:'stroke-dashoffset 1s linear'}}/>
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <span className="serif" style={{fontSize:25,fontWeight:500,color:'#fff'}}>{m}:{s}</span>
        </div>
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div className="cap-tag" style={{color:'var(--gold-soft)'}}>Focus</div>
        <div className="serif" style={{fontSize:20,fontWeight:500,color:'#fff',margin:'2px 0 11px'}}>Deep work</div>
        <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:13}}>
          {[0,1,2,3].map(i=><span key={i} style={{width:24,height:5,borderRadius:3,background:i<done?'var(--gold-soft)':'rgba(255,255,255,.16)'}}/>)}
          <span className="mini" style={{color:'#8fa89b',marginLeft:6}}>Session {Math.min(done+1,4)} of 4</span>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>setRun(r=>!r)} style={{background:'var(--gold)',border:'none',color:'#1a1410',borderRadius:8,padding:'6px 18px',fontSize:13,fontWeight:600,cursor:'pointer'}}>{run?'Pause':'Start'}</button>
          <button onClick={()=>{setRun(false);setLeft(TOTAL);}} style={{background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.14)',color:'#dfe7e1',borderRadius:8,padding:'6px 14px',fontSize:13,cursor:'pointer'}}>Reset</button>
        </div>
      </div>
    </div>
  );
}

function EdTaskCard({t,onOp,vault}){
  const [editing,setEditing]=useState(null);
  const [val,setVal]=useState('');
  const checked=!!(t.done||t.checked);
  const raw=t.raw||'';
  const activeTags=GOAL_LIST.filter(([g])=>raw.toLowerCase().includes('#'+g.toLowerCase())).map(([g])=>g);
  const startText=()=>{ if(checked)return; setVal(t.text); setEditing('text'); };
  const commitText=()=>{ const v=(val||'').trim(); if(v&&v!==t.text) onOp(t,'set_text',v); setEditing(null); };
  const cyclePrio=()=>{ const i=Math.max(0,PRIO_CYCLE.indexOf(t.prio||'')); onOp(t,'set_priority',PRIO_CYCLE[(i+1)%PRIO_CYCLE.length]); };
  const startDue=()=>{ setVal(t.due||''); setEditing('due'); };
  const fp=(t.path||''); const ofile=fp.endsWith('.md')?fp.slice(0,-3):fp;
  const srcEl=(vault&&t.path)
    ? <a href={`obsidian://open?vault=${encodeURIComponent(vault)}&file=${encodeURIComponent(ofile)}`} title={'Open in Obsidian: '+t.src} onClick={e=>e.stopPropagation()} className="mini" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:110,color:'var(--pine)',textDecoration:'none'}}>{t.src}</a>
    : <span className="mini" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:110}}>{t.src}</span>;
  return (
    <div className="kan-card">
      <div style={{display:'flex',gap:9,alignItems:'flex-start'}}>
        <span onClick={()=>onOp(t,'toggle_done')} title={checked?'Reopen':'Complete'} style={{flex:'none',width:16,height:16,marginTop:1,borderRadius:5,cursor:'pointer',border:'1.5px solid '+(checked?'var(--pine)':'var(--muted-2)'),background:checked?'var(--pine)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:10,lineHeight:1}}>{checked?'✓':''}</span>
        <div style={{flex:1,minWidth:0}}>
          {editing==='text'
            ? <input autoFocus value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();commitText();}else if(e.key==='Escape'){setEditing(null);}}} onBlur={commitText} style={{width:'100%',fontSize:12.5,fontWeight:500,color:'var(--ink)',border:'1px solid var(--pine)',borderRadius:6,padding:'4px 7px',outline:'none',fontFamily:'inherit',boxSizing:'border-box'}}/>
            : <div onClick={startText} title="Click to edit" style={{fontSize:12.5,fontWeight:500,color:'var(--ink)',lineHeight:1.4,cursor:'text',textDecoration:checked?'line-through':'none',opacity:checked?0.55:1,wordBreak:'break-word'}}>{t.text}</div>}
          {checked ? (
            <div style={{display:'flex',alignItems:'center',gap:8,marginTop:8}}>
              {t.done&&<span className="tagx">✅ {t.done.slice(5)}</span>}
              <span style={{flex:1}}/>
              {srcEl}
              <button onClick={()=>onOp(t,'delete')} title="Delete" style={{flex:'none',border:'none',background:'transparent',color:'var(--muted-2)',cursor:'pointer',fontSize:15,lineHeight:1,padding:'0 2px'}}>×</button>
            </div>
          ) : (
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:8,alignItems:'center'}}>
              <span onClick={cyclePrio} title="Priority, click to change" className="tagx" style={{cursor:'pointer',borderStyle:t.prio?'solid':'dashed',color:t.prio?'var(--pine)':'var(--muted-2)'}}>{t.prio||'priority'}</span>
              {editing==='due'
                ? <input type="date" autoFocus value={val} onChange={e=>{onOp(t,'set_due',e.target.value||'');setEditing(null);}} onBlur={()=>setEditing(null)} onKeyDown={e=>{if(e.key==='Escape')setEditing(null);}} style={{fontSize:11,border:'1px solid var(--pine)',borderRadius:6,padding:'2px 5px',fontFamily:'inherit',color:'var(--ink)'}}/>
                : <span onClick={startDue} title="Due date, click to change" className="tagx" style={{cursor:'pointer',borderStyle:t.due?'solid':'dashed',color:t.due?'var(--ink)':'var(--muted-2)'}}>{t.due?('📅 '+t.due.slice(5)):'+ due'}</span>}
              {GOAL_LIST.map(([g,c])=>{const on=activeTags.includes(g);return(<span key={g} onClick={()=>onOp(t,'toggle_tag',g)} title="Toggle goal tag" className="tagx" style={{cursor:'pointer',borderStyle:on?'solid':'dashed',background:on?c:'transparent',color:on?'#fff':'var(--muted-2)',borderColor:on?c:'var(--line)'}}>{g}</span>);})}

  },[]);

    setSaving(true);

      const r=await fetch(`${API}/productivity/capture`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,type:capType})});

              : schedule.map((s,i)=>(

                    <span style={{flex:'none',paddingTop:s.now?14:4}}>
                      <span style={{display:'block',width:9,height:9,borderRadius:'50%',border:'1.5px solid '+(s.now?'var(--pine)':'var(--muted-2)'),background:s.now?'var(--pine)':'transparent'}}/>
                    </span>
                    {s.now
                      ? <div style={{flex:1,minWidth:0,background:'var(--pine-tint)',border:'1px solid #cdddd2',borderRadius:10,padding:'10px 13px'}}>
                          <div style={{fontSize:14,color:'var(--pine)',fontWeight:600,lineHeight:1.3}}>{s.title}</div>
                          <div className="mini" style={{marginTop:3}}><span style={{color:'var(--pine)',fontWeight:600}}>Now</span>{s.meta?' · '+s.meta:''}</div>
                        </div>
                      : <div style={{flex:1,minWidth:0,paddingTop:1}}>
                          <div style={{fontSize:13.5,color:'var(--ink)',fontWeight:500,lineHeight:1.3}}>{s.title}</div>
                          <div className="mini" style={{marginTop:2}}>{s.meta}</div>

          </div>
          <div className="card">
            <div className="sec-h"><span className="t">Time tracked</span><span className="x">{timeTracked.weekHours||0}h this week</span></div>

                  <Bars days={timeTracked.days||[]}/>

      {/* Quick capture — sticky notes + jot, writes to vault */}

      {inbox.length>0&&<div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:14}}>
        {inbox.map((t,i)=>(
          <div key={i} className="sticky" style={{borderLeftColor:['var(--gold)','var(--pine)','#3f6f8f'][i%3]}}>
            <div>{t.text}</div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginTop:10}}>
              <span className="mini" style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.src}</span>
              <span title="Complete" onClick={()=>op(t,'toggle_done')} style={{cursor:'pointer',fontSize:12,color:'var(--pine)'}}>✓</span>
              <span title="Delete" onClick={()=>op(t,'delete')} style={{cursor:'pointer',fontSize:15,color:'var(--muted-2)',lineHeight:1}}>×</span>

          </div>

      <div className="card" style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
        <div style={{display:'flex',gap:2,background:'var(--surface-2)',border:'1px solid var(--line)',borderRadius:9,padding:3}}>

            <button key={v} onClick={()=>setCapType(v)} style={{padding:'5px 12px',borderRadius:6,border:'none',cursor:'pointer',fontSize:12.5,fontWeight:600,background:capType===v?'var(--pine)':'transparent',color:capType===v?'#fff':'var(--muted)'}}>{l}</button>

        <button onClick={submit} disabled={!cap.trim()||saving} style={{background:cap.trim()?'var(--accent)':'var(--surface-2)',border:'1px solid var(--line)',color:cap.trim()?'#fff':'var(--muted)',borderRadius:10,padding:'9px 18px',fontSize:13.5,fontWeight:600,cursor:cap.trim()?'pointer':'default'}}>{saving?'Saving…':'Add'}</button>
        {toast&&<span className="mini" style={{width:'100%',color:'var(--pine)'}}>{toast}</span>}
        {capType==='task'&&!toast&&<span className="mini" style={{width:'100%',color:'var(--muted-2)'}}>Modifiers: !1-!5 priority · today / tomorrow / fri / +3d / 2026-07-01 due · #oes #product #profile</span>}
      </div>

      {/* Tasks */}
      <div className="row-head"><h3>Tasks</h3><span className="mini">{surfaced} surfaced · {counts.open!=null?counts.open:surfaced} open · {counts.inbox||0} in inbox</span></div>
      {surfaced===0
        ? <div className="card" style={{textAlign:'center',color:'var(--muted)',padding:'26px'}}>✅ Nothing dated or flagged. Add due dates or priorities in your notes and they’ll appear here.</div>
        : <div className="kan">
            {buckets.map(([k,label])=>(
              <div key={k} className="kan-col">
                <div className="kan-h"><span>{label}</span><span>{(tasks[k]||[]).length}</span></div>
                {k==='today'
                  ? [['am','Morning · writing / profile'],['day','Day job · OES']].map(([ln,lnl])=>{
                      const items=(tasks[k]||[]).filter(t=>lane(t)===ln);
                      return items.length>0?(
                        <div key={ln} style={{marginBottom:6}}>
                          <div className="mini" style={{color:'var(--muted-2)',margin:'2px 0 6px'}}>{lnl}</div>
                          {items.map((t,i)=>(<EdTaskCard key={i} t={t} onOp={op} vault={vault}/>))}
                        </div>):null;
                    })
                  : (tasks[k]||[]).map((t,i)=>(<EdTaskCard key={i} t={t} onOp={op} vault={vault}/>))}
                {(tasks[k]||[]).length===0&&<div className="mini" style={{padding:'4px 2px'}}>—</div>}
              </div>
            ))}
          </div>}

      {(weekly.focus&&weekly.focus.length>0)&&<React.Fragment>
        <div className="row-head"><h3>This week</h3><span className="mini">{weekly.title||'03_Weekly'}</span></div>
        <div className="card" style={{display:'flex',flexWrap:'wrap',gap:'10px 28px'}}>
          {weekly.focus.map((f,i)=>(
            <span key={i} style={{display:'flex',gap:9,fontSize:13.5,color:'var(--ink)',lineHeight:1.5,alignItems:'flex-start'}}>
              <span className="habit-dot" style={{background:'var(--gold)',marginTop:6}}/><span>{f}</span>
            </span>
          ))}
          {(weekly.revenue!=null||weekly.passive!=null||weekly.leads!=null)&&(
            <span style={{display:'flex',gap:18,flexWrap:'wrap',width:'100%',borderTop:'1px solid var(--line-soft)',paddingTop:12,marginTop:2}}>
              {weekly.revenue!=null&&<span><div className="mini">Consultancy</div><div className="serif" style={{fontSize:18,color:'var(--pine)'}}>${weekly.revenue}</div></span>}
              {weekly.passive!=null&&<span><div className="mini">Passive</div><div className="serif" style={{fontSize:18,color:'var(--pine)'}}>${weekly.passive}</div></span>}
              {weekly.leads!=null&&<span><div className="mini">Leads</div><div className="serif" style={{fontSize:18,color:'var(--pine)'}}>{weekly.leads}</div></span>}
            </span>
          )}
        </div>
      </React.Fragment>}

      {/* Projects */}
      <div className="row-head"><h3>Projects</h3><span className="mini">05_Projects</span></div>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {projects.map((p,i)=>(
          <div key={i} className="card card-i" style={{display:'grid',gridTemplateColumns:'1fr auto',gap:16,alignItems:'center'}}>
            <div style={{minWidth:0}}>
              <div className="serif" style={{fontSize:16,fontWeight:500,color:'var(--ink)'}}>{p.title}</div>
              {p.next&&<div className="mini" style={{marginTop:5}}>Next: {p.next}</div>}
            </div>
            <div style={{textAlign:'right',minWidth:168}}>
              <span className={"stag "+(p.st||'st-mute')}>{p.status}</span>
              <div className="bar" style={{marginTop:10}}><i style={{width:(p.pct||0)+'%'}}/></div>
              <div className="mini" style={{marginTop:5}}>{p.pct||0}% complete</div>
            </div>
          </div>
        ))}
        {projects.length===0&&<div className="card mini">No projects found in 05_Projects.</div>}
      </div>

      {/* Weekly review board (kanban) */}
      <div className="row-head"><h3>Weekly review board</h3><span className="mini">{(review.momentum&&review.momentum.this)||0} closed this week{review.momentum&&review.momentum.prev!=null?`, ${review.momentum.prev} last week`:''} · stuck · needs you</span></div>
      <div className="kan" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
        {[['closed','✅ Closed this week',review.closed],['waiting','⏳ Waiting too long',review.waiting],['attention','⚠️ Needs attention',review.attention]].map(([k,label,arr])=>(
          <div key={k} className="kan-col">
            <div className="kan-h"><span>{label}</span><span>{(arr||[]).length}</span></div>
            {(arr||[]).map((t,i)=>(<EdTaskCard key={i} t={t} onOp={op} vault={vault}/>))}

}

// ── App ────────────────────────────────────────────────────────────────────
function App() {
  const [sessionId,setSessionId]   = useState(()=>crypto.randomUUID());
  const [messages,setMessages]     = useState([]);
  const [input,setInput]           = useState('');
  const [streaming,setStreaming]   = useState(false);
  const [sessionCost,setSessionCost] = useState(0);
  const [showCost,setShowCost]     = useState(false);
  const [showSidebar,setShowSidebar] = useState(true);
  const [routeMode,setRouteMode]   = useState('auto');
  const [pinnedModel,setPinnedModel] = useState('');
  const [models,setModels]         = useState({});
  const [sidebarTick,setSidebarTick] = useState(0);
  const [view,setView]             = useState('chat');   // 'chat' | 'admin'
  const [attached,setAttached]     = useState([]);        // chat-mode filenames
  const [uploadMode,setUploadMode] = useState('chat');    // 'chat' | 'kb'
  const [uploading,setUploading]   = useState(false);
  const [improving,setImproving]   = useState(false);
  const [roster,setRoster]         = useState(null);
  const [wjDept,setWjDept]         = useState(null);      // selected department obj
  const [wjAgent,setWjAgent]       = useState(null);      // selected employee obj
  const [useTools,setUseTools]     = useState(true);      // let agents call n8n workflows
  const bottomRef = useRef(null);
  const abortRef  = useRef(null);
  const fileRef   = useRef(null);

  useEffect(()=>{
    fetch(`${API}/models`).then(r=>r.json()).then(setModels).catch(()=>{});
    fetch(`${API}/wijerco/roster`).then(r=>r.json()).then(setRoster).catch(()=>{});
  },[]);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:'smooth'}); },[messages]);

  const loadSession = async id => {
    setSessionId(id);
    try {
      const d = await fetch(`${API}/sessions/${id}`).then(r=>r.json());
      setMessages((d.messages||[]).map((m,i)=>({
        id:i, role:m.role, content:m.content,
        modelLabel:m.model_key||'', cost_usd:m.cost_usd||0, latency_ms:0,
      })));
      setSessionCost(d.total_cost_usd||0);
    } catch {}
  };

  const newSession = () => {
    setSessionId(crypto.randomUUID());
    setMessages([]);
    setSessionCost(0);
    setAttached([]);
  };

  const send = async () => {
    const q = input.trim();
    if(!q||streaming) return;
    setInput('');
    const uid = Date.now();
    const aid = uid+1;
    setMessages(prev=>[...prev,{id:uid,role:'user',content:q},{id:aid,role:'assistant',content:'',streaming:true}]);
    setStreaming(true);

    const ep = routeMode==='rag' ? '/query/stream' : '/hybrid/stream';
    const body = {query:q,session_id:sessionId,system_prompt:'',conversation_history:[],force_model_key:pinnedModel||null,max_tier:3,tools:useTools&&routeMode!=='rag'};
    if(wjAgent){ body.subagent = wjAgent.slug; body.department = wjAgent.department; }
    try {
      const ctrl = new AbortController();
      abortRef.current = ctrl;
      const resp = await fetch(`${API}${ep}`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(body),
        signal:ctrl.signal,
      });
      const reader = resp.body.getReader();
      const dec = new TextDecoder();
      let buf='', full='', meta={};

      while(true) {
        const {done,value}=await reader.read();
        if(done) break;
        buf+=dec.decode(value,{stream:true});
        const parts=buf.split('\n\n'); buf=parts.pop()||'';
        for(const part of parts) {
          if(!part.startsWith('data: ')) continue;
          const raw=part.slice(6).trim();
          if(raw==='[DONE]') break;
          try {
            const ev=JSON.parse(raw);
            if(ev.type==='tool_call'){
              setMessages(prev=>prev.map(m=>m.id===aid?{...m,tools:[...(m.tools||[]),{name:ev.tool,status:'running'}]}:m));
            } else if(ev.type==='tool_result'){
              setMessages(prev=>prev.map(m=>m.id===aid?{...m,tools:(m.tools||[]).map(t=>(t.name===ev.tool&&t.status==='running')?{...t,status:ev.ok?'done':'error'}:t)}:m));
            } else if(ev.type==='meta'||ev.route){ meta={...meta,...ev}; }
            else if(!ev.done&&ev.token){
              full+=ev.token;
              setMessages(prev=>prev.map(m=>m.id===aid?{...m,content:full}:m));
            } else if(ev.done){ meta={...meta,...ev}; }
          } catch {}
        }
      }
      const cost=meta.cost_usd||0;
      setMessages(prev=>prev.map(m=>m.id===aid?{...m,streaming:false,provider:meta.provider,modelLabel:meta.model_label||meta.model_key,cost_usd:cost,latency_ms:meta.latency_ms||0,dept:meta.route||meta.department,memory:!!meta.memory_used}:m));
      setSessionCost(p=>p+cost);
      setSidebarTick(n=>n+1);
    } catch(err) {
      if(err.name!=='AbortError')
        setMessages(prev=>prev.map(m=>m.id===aid?{...m,streaming:false,content:'[Connection error — is the orchestrator running on port 8000?]'}:m));
    } finally { setStreaming(false); abortRef.current=null; }
  };

  const stop=()=>{ abortRef.current?.abort(); setStreaming(false); };

  const onPickFile = () => fileRef.current?.click();

  const handleUpload = async (e) => {
    const file = e.target.files?.[0];
    if(!file) return;
    setUploading(true);
    const fd = new FormData();
    fd.append('file', file);
    fd.append('mode', uploadMode);
    fd.append('session_id', sessionId);
    try {
      const r = await fetch(`${API}/upload`,{method:'POST',body:fd});
      const d = await r.json();
      if(d.mode==='kb'){
        setMessages(prev=>[...prev,{id:Date.now(),role:'assistant',content:`📥 Indexed "${d.file}" into the knowledge base (${d.chunks} chunks). It's now searchable across all conversations.`,streaming:false}]);
      } else {
        setAttached(d.attached||[file.name]);
      }
    } catch {
      setMessages(prev=>[...prev,{id:Date.now(),role:'assistant',content:'[Upload failed — check the file type and that the orchestrator is running.]',streaming:false}]);
    } finally {
      setUploading(false);
      if(fileRef.current) fileRef.current.value='';
    }
  };

  const clearAttached = async () => {
    try { await fetch(`${API}/upload/${sessionId}`,{method:'DELETE'}); } catch {}
    setAttached([]);
  };

  const handleImprove = async () => {
    const draft = input.trim();
    if(!draft||improving) return;
    setImproving(true);
    try {
      const r = await fetch(`${API}/improve-prompt`,{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({prompt:draft,max_tier:1}),
      });
      const d = await r.json();
      if(d.improved) setInput(d.improved);
    } catch {} finally { setImproving(false); }
  };

  const QUICK = [
    "What are the latest trends in Australian higher education?",
    "Draft a proposal for a micro-credential in data literacy.",
    "What's the most cost-effective LinkedIn strategy for WijerCo?",
    "Summarise the key TEQSA compliance requirements for 2025.",
  ];

  const avail = Object.entries(models).filter(([,v])=>v.available);

  const VIEW_LABELS = {chat:'Chat',admin:'Usage',quality:'Quality',productivity:'Productivity',harness:'Self-Improve',n8n:'Automations',operating:'Operating',governance:'Governance',library:'Deliverables',content:'Content pipeline',production:'Production',media:'Media library',engagements:'Engagements',kb:'Knowledge base',memory:'Memory',intel:'Sector intel',trace:'Routing',schedule:'Scheduled runs'};
  const NAV = [
    {label:'Workspace', items:[
      ['chat','Chat',<svg viewBox="0 0 24 24"><path d="M4 5h16v11H9l-4 4V5z" strokeLinejoin="round"/></svg>],

      ['media','Media library',<svg viewBox="0 0 24 24"><path d="M4 6h5l2 3h9v10H4z" strokeLinejoin="round"/><path d="M8 15l2-2 2 2 3-4 3 4" strokeLinecap="round" strokeLinejoin="round"/></svg>],

      ['intel','Sector intel',<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M4 12h16M12 4c2.6 2.6 2.6 12.8 0 16M12 4c-2.6 2.6-2.6 12.8 0 16"/></svg>],
    ]},
    {label:'Operations', items:[
      ['n8n','Automations',<svg viewBox="0 0 24 24"><circle cx="6" cy="12" r="2.3"/><circle cx="18" cy="6" r="2.3"/><circle cx="18" cy="18" r="2.3"/><path d="M8.2 11l7.6-4M8.2 13l7.6 4"/></svg>],
      ['operating','Operating',<svg viewBox="0 0 24 24"><path d="M4 6h9M4 12h16M4 18h11" strokeLinecap="round"/><path d="M16 4l4 4-4 4" strokeLinecap="round" strokeLinejoin="round"/></svg>],
      ['governance','Governance',<svg viewBox="0 0 24 24"><path d="M12 3l7 3v5c0 4.5-2.8 8.1-7 10-4.2-1.9-7-5.5-7-10V6z" strokeLinejoin="round"/><path d="M9 12l2 2 4-5" strokeLinecap="round" strokeLinejoin="round"/></svg>],
      ['schedule','Scheduled',<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 2" strokeLinecap="round"/></svg>],
      ['trace','Routing',<svg viewBox="0 0 24 24"><path d="M6 4v6a4 4 0 004 4h8" strokeLinecap="round"/><path d="M15 11l3 3-3 3" strokeLinecap="round" strokeLinejoin="round"/></svg>],
      ['harness','Self-Improve',<svg viewBox="0 0 24 24"><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1" strokeLinecap="round"/></svg>],
    ]},
  ];

  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      {/* ── Left rail ── */}
      <div className="rail">
        <div className="rail-brand">
          <span className="rail-mark">Wijer<span>Co</span></span>
          <span className="rail-tag">Command Centre</span>
        </div>
        <div className="rail-divider"/>
        <nav className="rail-nav">
          {NAV.map((sec,si)=>(
            <div key={sec.label}>
              <div className="nav-label" style={{paddingTop:si?16:0}}>{sec.label}</div>
              {sec.items.map(([v,l,ic])=>(
                <button key={v} className={`nav-item${view===v?' active':''}`} onClick={()=>setView(v)}>
                  {ic}<span>{l}</span>
                </button>
              ))}
            </div>
          ))}
        </nav>
        <div className="rail-foot">
          <div className="rail-card">
            <div className="rail-av">AW</div>
            <div>
              <div style={{fontSize:12.5,fontWeight:600,color:'#eef4f0',lineHeight:1.25}}>WijerCo</div>
              <div style={{fontSize:10.5,color:'#8fa89b',marginTop:1}}>Aaron Wijeratne</div>
            </div>
          </div>
        </div>
      </div>

      {/* ── Collapsible conversations ── */}
      {showSidebar&&view==='chat'&&<SessionSidebar currentId={sessionId} onSelect={loadSession} onNew={newSession} tick={sidebarTick}/>}

      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>
        {/* Topbar */}
        <div className="topbar">
          {view==='chat'&&<button className="icon-btn" onClick={()=>setShowSidebar(v=>!v)} title="Toggle conversations">☰</button>}
          <div className="crumb">Workspace / <b>{VIEW_LABELS[view]}</b></div>

            {[[8000,'API'],[8001,'Data'],[8002,'Search'],[8003,'Cloud'],[8006,'RAG']].map(([p,l])=>(

        {view==='operating' && <OperatingView/>}

        {view==='library' && <DeliverablesLibrary/>}

        {view==='production' && <ProductionPipeline/>}
        {view==='media' && <MediaLibraryView/>}
        {view==='engagements' && <EngagementsView/>}
        {view==='kb' && <KnowledgeBaseView/>}
        {view==='memory' && <MemoryView/>}
        {view==='intel' && <SectorIntelView/>}
        {view==='trace' && <RoutingInspector/>}
        {view==='schedule' && <ScheduledRunsView/>}
