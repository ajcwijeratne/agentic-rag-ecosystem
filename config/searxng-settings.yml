# SearXNG settings for Agentic RAG Ecosystem
use_default_settings: true

general:
  debug: false
  instance_name: "Agentic RAG Search"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "changeme-secret-key-32chars"
  limiter: false
  image_proxy: false

ui:
  static_use_hash: true
  default_locale: "en"
  query_in_title: false

outgoing:
  request_timeout: 10.0
  max_request_timeout: 30.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20

engines:
  - name: google
    engine: google
    shortcut: g
    use_mobile_ui: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg

  - name: bing
    engine: bing
    shortcut: bi

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    base_url: "https://en.wikipedia.org/"

  - name: arxiv
    engine: arxiv
    shortcut: arxiv
    timeout: 10.0
